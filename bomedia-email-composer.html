<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bomedia Email Composer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:#f3f4f6;color:#1e293b;overflow:hidden;height:100vh}

/* Layout */
.app{display:flex;flex-direction:column;height:100vh}
.header{background:#fff;border-bottom:1px solid #e5e7eb;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:14px}
.header-title{font-size:13px;font-weight:800;color:#111}
.header-sub{font-size:11px;color:#9ca3af}
.header-right{display:flex;gap:8px;align-items:center}

.main{display:flex;flex:1;overflow:hidden}
.footer{background:#fff;border-top:1px solid #e5e7eb;padding:5px 16px;display:flex;justify-content:space-between;font-size:11px;color:#9ca3af;flex-shrink:0}

/* Sidebar */
.sidebar{width:200px;background:#fff;border-right:1px solid #e5e7eb;padding:12px;overflow-y:auto;flex-shrink:0}
.sidebar-title{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px}
.add-btn{width:100%;display:flex;align-items:center;gap:8px;padding:6px 8px;border:none;background:transparent;border-radius:8px;cursor:pointer;text-align:left;transition:background .15s}
.add-btn:hover{background:#f3f4f6}
.add-btn-icon{font-size:14px;opacity:.7}
.add-btn-label{font-size:11px;font-weight:600;color:#374151}
.add-btn-desc{font-size:10px;color:#9ca3af}

.template-section{margin-top:16px;padding-top:12px;border-top:1px solid #f3f4f6}
.tpl-btn{width:100%;padding:8px;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;margin-bottom:4px;transition:all .15s}
.tpl-blue{background:#eff6ff;color:#1d4ed8}.tpl-blue:hover{background:#dbeafe}
.tpl-orange{background:#fff7ed;color:#c2410c}.tpl-orange:hover{background:#ffedd5}
.tpl-purple{background:#f5f3ff;color:#6d28d9}.tpl-purple:hover{background:#ede9fe}

/* Editor panel */
.editor{flex:1;padding:16px;overflow-y:auto}
.editor-inner{max-width:500px;margin:0 auto}
.empty-state{text-align:center;padding:60px 20px;color:#9ca3af}
.empty-icon{font-size:40px;opacity:.4;margin-bottom:12px}

/* Block card */
.block-card{background:#fff;border-radius:8px;border:1px solid #e5e7eb;border-left:4px solid #9ca3af;margin-bottom:8px;overflow:hidden}
.block-card.blue{border-left-color:#3b82f6}
.block-card.purple{border-left-color:#8b5cf6}
.block-card.orange{border-left-color:#f97316}
.block-card.green{border-left-color:#22c55e}
.block-card.dark{border-left-color:#475569}

.block-header{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#f9fafb;border-bottom:1px solid #f3f4f6}
.block-header-left{display:flex;align-items:center;gap:6px}
.block-type-icon{font-size:12px}
.block-type-label{font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.8px}
.block-actions{display:flex;align-items:center;gap:2px}
.block-actions button{border:none;background:transparent;cursor:pointer;padding:3px;color:#9ca3af;border-radius:4px;display:flex;align-items:center;transition:color .15s}
.block-actions button:hover{color:#374151}
.block-actions button:disabled{opacity:.25;cursor:default}
.block-actions .del-btn:hover{color:#ef4444}

.block-body{padding:8px 10px}
.block-body textarea{width:100%;border:1px solid #e5e7eb;border-radius:6px;padding:8px;font-size:12px;font-family:inherit;resize:vertical;min-height:70px;outline:none;line-height:1.5}
.block-body textarea:focus{border-color:#93c5fd;box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.block-body select{font-size:11px;border:1px solid #d1d5db;border-radius:6px;padding:4px 8px;background:#fff;outline:none}
.block-body select:focus{border-color:#93c5fd}
.block-body .prod-selectors{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.block-body .prod-selectors label{font-size:10px;color:#9ca3af;display:flex;align-items:center;gap:4px}
.block-body .fixed-msg{font-size:11px;color:#9ca3af;font-style:italic}

/* Preview */
.preview-panel{width:50%;border-left:1px solid #e5e7eb;background:#fff;overflow-y:auto;display:flex;flex-direction:column}
.preview-header{position:sticky;top:0;background:#fff;border-bottom:1px solid #f3f4f6;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;z-index:10}
.preview-label{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:1px}
.preview-content{padding:16px;flex:1}
.preview-frame{border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}
.html-code{padding:16px;font-family:'Menlo','Monaco','Courier New',monospace;font-size:10px;line-height:1.6;color:#475569;white-space:pre-wrap;word-break:break-all;overflow-x:auto}

/* Buttons */
.btn{border:none;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-success{background:#22c55e;color:#fff}
.btn-ghost{background:#f3f4f6;color:#6b7280}.btn-ghost:hover{background:#e5e7eb}
.btn-toggle{background:#eff6ff;color:#2563eb}
.btn-toggle.off{background:#f3f4f6;color:#9ca3af}

/* Responsive */
@media(max-width:900px){
  .sidebar{width:160px}
  .preview-panel{display:none}
}
</style>
</head>

function createBlock(type) {

  switch(type) {

  var bgExtra = p.brand === 'pimpam' ? ';background:#fff7ed' : '';

    '<tr><td style="padding:12px' + bgExtra + '">' +
    '<span style="display:inline-block;font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:20px;margin-bottom:6px;background:' + p.badgeBg + ';color:' + p.badgeColor + '">' + p.badge + '</span>' +

    '<p style="font-size:10px;color:#64748b;margin:4px 0 0;line-height:1.45">' + p.desc + '</p>' +

    '<p style="font-size:10px;color:#475569;padding:2px 0;margin:0">✓ ' + p.feat2 + '</p>' +
    '<p style="font-size:13px;font-weight:900;color:' + p.accent + ';margin:8px 0 0;text-align:center">' + p.price + priceExtra + '</p>' +
    '<a href="' + p.link + '" style="display:block;text-align:center;font-size:11px;font-weight:800;text-decoration:none;padding:9px 10px;border-radius:8px;text-transform:uppercase;background:' + p.gradient + ';color:#fff;margin-top:6px">' + ctaLabel + ' →</a>' +
    '</td></tr></table>';
}

function brandStripHtml(key) {

function textBlockHtml(text) {
  var lines = text.split('\n');
  var html = '';
  for (var i = 0; i < lines.length; i++) {
    if (lines[i].trim()) html += '<p style="margin:0 0 14px">' + lines[i] + '</p>\n';

  return '<tr><td style="padding:16px 8px;font-size:14px;color:#1e293b;line-height:1.65">\n' + html + '</td></tr>';
}

function pimpamStepsHtml() {
  var steps = [
    {n:"1️⃣",t:"Elige diseño",s:"Pantalla táctil"},
    {n:"2️⃣",t:"Personaliza",s:"Texto, colores…"},
    {n:"3️⃣",t:"Paga",s:"Tarjeta / QR"},

  ];

      '<div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:10px;text-align:center">' +

  }
  return '<tr><td style="padding:0 8px 16px"><table width="100%" cellpadding="0" cellspacing="0" border="0"><tr>'+cells+'</tr></table></td></tr>';

var CSS_BLOCK = '<style>' +
  'body,table,td,p,a,h1,h2,h3,h4{margin:0;padding:0;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%}' +
  'table{border-collapse:collapse;mso-table-lspace:0;mso-table-rspace:0}' +
  'img{border:0;display:block;line-height:100%;outline:none;text-decoration:none;-ms-interpolation-mode:bicubic;max-width:100%}' +
  'body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;background:#ffffff;color:#1e293b}' +
  '@media only screen and (max-width:600px){' +
  '.wrap{width:100%!important}.col-half,.col-third{width:100%!important;display:block!important;padding:0 0 12px 0!important}' +
  '.prod-row{display:block!important;width:100%!important}.prod-cell{display:block!important;width:100%!important;padding:0 0 16px 0!important}' +
  '.prod-cell table{width:100%!important}.pp-img-cell{display:block!important;width:100%!important}' +
  '.pp-body-cell{display:block!important;width:100%!important;padding:18px 16px!important}' +
  '.step-cell{width:50%!important;display:inline-block!important;padding:0 4px 12px!important}' +
  '}' +
  '</style>';

function generateFullHtml(blocks) {
  var rows = '';
  for (var i = 0; i < blocks.length; i++) {
    var b = blocks[i];
    switch(b.type) {
      case 'text': rows += textBlockHtml(b.text); break;
      case 'brand_artisjet': rows += brandStripHtml('artisjet'); break;
      case 'brand_mbo': rows += brandStripHtml('mbo'); break;
      case 'brand_pimpam': rows += brandStripHtml('pimpam'); break;
      case 'product_pair':
        var p1 = PRODUCTS.find(function(p){return p.id===b.product1});
        var p2 = PRODUCTS.find(function(p){return p.id===b.product2});
        if(p1&&p2) rows += productPairHtml(p1,p2);
        break;
      case 'product_single':
        var ps = PRODUCTS.find(function(p){return p.id===b.product1});
        if(ps) rows += productSingleHtml(ps);
        break;
      case 'freebird': rows += freebirdHtml(); break;
      case 'pimpam_hero': rows += pimpamHeroHtml(); break;
      case 'pimpam_steps': rows += pimpamStepsHtml(); break;
    }
  }
  return '<html><head>'+CSS_BLOCK+'</head><body style="font-family:\'Helvetica Neue\',Helvetica,Arial,sans-serif;margin:0;padding:0;background:#ffffff;color:#1e293b">' +
    '<table class="wrap" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin:0 auto">' + rows + '</table></body></html>';
}

// ─── ARROW SVG ───────────────────────────────────────────────
function ArrowUp(){return e('svg',{width:14,height:14,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2},e('path',{d:"M18 15l-6-6-6 6"}))}
function ArrowDown(){return e('svg',{width:14,height:14,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2},e('path',{d:"M6 9l6 6 6-6"}))}
function XIcon(){return e('svg',{width:14,height:14,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2},e('path',{d:"M18 6L6 18M6 6l12 12"}))}

// ─── PRODUCT SELECT ──────────────────────────────────────────
function ProductSelect(props) {
  return e('select', {value:props.value, onChange:function(ev){props.onChange(ev.target.value)}},
    PRODUCTS.map(function(p){
      return e('option', {key:p.id, value:p.id, disabled:p.id===props.exclude}, p.name + ' — ' + p.price);
    })
  );
}

// ─── BLOCK EDITOR ────────────────────────────────────────────
function BlockEditor(props) {
  var block = props.block;
  var info = BLOCK_TYPES.find(function(t){return t.type===block.type}) || {icon:'',label:'',cardClass:''};

  var body;
  if (block.type === 'text') {
    body = e('textarea', {
      value: block.text,
      onChange: function(ev) { props.onChange(Object.assign({}, block, {text: ev.target.value})); },
      placeholder: "Escribe tu texto aquí..."
    });
  } else if (block.type === 'product_pair') {
    body = e('div', {className:'prod-selectors'},
      e('label', null, 'Izq: ', e(ProductSelect, {value:block.product1, onChange:function(v){props.onChange(Object.assign({},block,{product1:v}))}, exclude:block.product2})),
      e('label', null, 'Der: ', e(ProductSelect, {value:block.product2, onChange:function(v){props.onChange(Object.assign({},block,{product2:v}))}, exclude:block.product1}))
    );
  } else if (block.type === 'product_single') {
    body = e('div', {className:'prod-selectors'},
      e('label', null, 'Producto: ', e(ProductSelect, {value:block.product1, onChange:function(v){props.onChange(Object.assign({},block,{product1:v}))}}))
    );
  } else {
    body = e('p', {className:'fixed-msg'}, 'Bloque predefinido — sin opciones editables');
  }

  return e('div', {className:'block-card ' + info.cardClass},
    e('div', {className:'block-header'},
      e('div', {className:'block-header-left'},
        e('span', {className:'block-type-icon'}, info.icon),
        e('span', {className:'block-type-label'}, info.label)
      ),
      e('div', {className:'block-actions'},
        e('button', {onClick:props.onMoveUp, disabled:props.isFirst, title:'Subir'}, e(ArrowUp)),
        e('button', {onClick:props.onMoveDown, disabled:props.isLast, title:'Bajar'}, e(ArrowDown)),
        e('button', {onClick:props.onDelete, className:'del-btn', title:'Eliminar'}, e(XIcon))
      )
    ),
    e('div', {className:'block-body'}, body)
  );
}

// ─── MAIN APP ────────────────────────────────────────────────
function EmailComposer() {
  var _s1 = useState([createBlock("text")]);
  var blocks = _s1[0], setBlocks = _s1[1];
  var _s2 = useState(false);
  var copied = _s2[0], setCopied = _s2[1];
  var _s3 = useState(true);
  var showPreview = _s3[0], setShowPreview = _s3[1];
  var _s4 = useState(false);
  var showHtmlCode = _s4[0], setShowHtmlCode = _s4[1];

  function addBlock(type) { setBlocks(function(prev){return prev.concat([createBlock(type)])}); }
  function updateBlock(id, updated) { setBlocks(function(prev){return prev.map(function(b){return b.id===id?updated:b})}); }
  function deleteBlock(id) { setBlocks(function(prev){return prev.filter(function(b){return b.id!==id})}); }
  function moveBlock(id, dir) {
    setBlocks(function(prev){
      var idx = prev.findIndex(function(b){return b.id===id});
      if((dir===-1&&idx===0)||(dir===1&&idx===prev.length-1)) return prev;
      var arr = prev.slice();
      var tmp = arr[idx]; arr[idx] = arr[idx+dir]; arr[idx+dir] = tmp;
      return arr;
    });
  }

  function copyHtml() {
    var html = generateFullHtml(blocks);
    try {
      navigator.clipboard.write([
        new ClipboardItem({
          'text/html': new Blob([html], {type:'text/html'}),
          'text/plain': new Blob([html], {type:'text/plain'})
        })
      ]).then(function(){
        setCopied(true); setTimeout(function(){setCopied(false)}, 2500);
      });
    } catch(err) {
      navigator.clipboard.writeText(html).then(function(){
        setCopied(true); setTimeout(function(){setCopied(false)}, 2500);
      });
    }
  }

  function loadTemplate(tpl) {
    if (tpl === 'compactas') {
      setBlocks([
        createBlock("text"),
        Object.assign(createBlock("brand_artisjet")),
        Object.assign(createBlock("product_pair"), {product1:"young",product2:"3000pro"}),
        Object.assign(createBlock("text"), {text:"Y en nuestra línea MBO, tenemos opciones con precios muy competitivos:"}),
        Object.assign(createBlock("brand_mbo")),
        Object.assign(createBlock("product_pair"), {product1:"mbo3050",product2:"mbo4060"}),
        Object.assign(createBlock("text"), {text:"Si quieres, podemos organizar una demo sin compromiso.\n\n¡Quedo a tu disposición!\nUn saludo,"}),
      ]);
    } else if (tpl === 'pimpam') {
      setBlocks([
        createBlock("text"),
        Object.assign(createBlock("brand_pimpam")),
        createBlock("pimpam_hero"),
        Object.assign(createBlock("product_pair"), {product1:"casebox",product2:"custom"}),
        Object.assign(createBlock("text"), {text:"El proceso para el usuario es muy sencillo — 4 pasos:"}),
        createBlock("pimpam_steps"),
        Object.assign(createBlock("text"), {text:"Si te interesa, puedo enviarte más detalles.\n\n¡Un saludo!"}),
      ]);
    } else if (tpl === 'formatos') {
      setBlocks([
        createBlock("text"),
        Object.assign(createBlock("brand_artisjet")),
        Object.assign(createBlock("product_pair"), {product1:"3000pro",product2:"6090trust"}),
        createBlock("freebird"),
        Object.assign(createBlock("text"), {text:"En nuestra línea MBO, tenemos opciones desde semiformato hasta gran formato industrial:"}),
        Object.assign(createBlock("brand_mbo")),
        Object.assign(createBlock("product_pair"), {product1:"mbo6090",product2:"uv1612g"}),
        Object.assign(createBlock("text"), {text:"¡Quedo a tu disposición!\nUn saludo,"}),
      ]);
    }
  }

  var fullHtml = generateFullHtml(blocks);
  var sizeKb = (new Blob([fullHtml]).size / 1024).toFixed(1);

  // ─── RENDER ─────────────────────────────────────────────
  return e('div', {className:'app'},
    // Header
    e('div', {className:'header'},
      e('div', {className:'header-left'},
        e('div', {className:'logo'}, 'B'),
        e('div', null,
          e('div', {className:'header-title'}, 'Bomedia Email Composer'),
          e('div', {className:'header-sub'}, 'Compón emails con bloques de producto UV-LED')
        )
      ),
      e('div', {className:'header-right'},
        e('button', {className:'btn ' + (showPreview?'btn-toggle':'btn-toggle off'), onClick:function(){setShowPreview(!showPreview)}}, showPreview?'Preview ON':'Preview OFF'),
        e('button', {className:'btn ' + (copied?'btn-success':'btn-primary'), onClick:copyHtml}, copied?'¡Copiado!':'Copiar HTML')
      )
    ),

    // Main
    e('div', {className:'main'},
      // Sidebar
      e('div', {className:'sidebar'},
        e('p', {className:'sidebar-title'}, 'Añadir bloque'),
        BLOCK_TYPES.map(function(bt){
          return e('button', {key:bt.type, className:'add-btn', onClick:function(){addBlock(bt.type)}},
            e('span', {className:'add-btn-icon'}, bt.icon),
            e('div', null,
              e('div', {className:'add-btn-label'}, bt.label),
              e('div', {className:'add-btn-desc'}, bt.desc)
            )
          );
        }),
        e('div', {className:'template-section'},
          e('p', {className:'sidebar-title'}, 'Plantillas rápidas'),
          e('button', {className:'tpl-btn tpl-blue', onClick:function(){loadTemplate('compactas')}}, 'Compactas UV-LED'),
          e('button', {className:'tpl-btn tpl-orange', onClick:function(){loadTemplate('pimpam')}}, 'PimPam Vending'),
          e('button', {className:'tpl-btn tpl-purple', onClick:function(){loadTemplate('formatos')}}, 'Formatos varios')
        )
      ),

      // Editor
      e('div', {className:'editor', style:{width:showPreview?'50%':'100%'}},
        e('div', {className:'editor-inner'},
          blocks.length === 0
            ? e('div', {className:'empty-state'},
                e('div', {className:'empty-icon'}, '📧'),
                e('p', {style:{fontSize:13,fontWeight:500}}, 'Añade bloques desde el panel izquierdo'),
                e('p', {style:{fontSize:11,color:'#cbd5e1',marginTop:4}}, 'o usa una plantilla rápida')
              )
            : blocks.map(function(block, idx){
                return e(BlockEditor, {
                  key: block.id,
                  block: block,
                  onChange: function(u){updateBlock(block.id,u)},
                  onDelete: function(){deleteBlock(block.id)},
                  onMoveUp: function(){moveBlock(block.id,-1)},
                  onMoveDown: function(){moveBlock(block.id,1)},
                  isFirst: idx===0,
                  isLast: idx===blocks.length-1
                });
              })
        )
      ),

      // Preview
      showPreview && e('div', {className:'preview-panel'},
        e('div', {className:'preview-header'},
          e('span', {className:'preview-label'}, 'Vista previa email'),
          e('button', {className:'btn btn-ghost', onClick:function(){setShowHtmlCode(!showHtmlCode)}}, showHtmlCode?'Ver preview':'Ver HTML')
        ),
        showHtmlCode
          ? e('pre', {className:'html-code'}, fullHtml)
          : e('div', {className:'preview-content'},
              e('div', {className:'preview-frame', dangerouslySetInnerHTML:{__html:fullHtml}})
            )
      )
    ),

    // Footer
    e('div', {className:'footer'},
      e('span', null, blocks.length + ' bloque' + (blocks.length!==1?'s':'')),
      e('span', null, sizeKb + ' KB')
    )
  );
}

ReactDOM.render(e(EmailComposer), document.getElementById('root'));
</script>
</body>
</html>
