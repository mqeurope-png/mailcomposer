<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' https://cdnjs.cloudflare.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src https://api.openai.com https://midvgxxndddasxlnstkg.supabase.co; img-src * data: blob:; font-src 'self' https://fonts.gstatic.com; frame-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none';">
<title>Bomedia Email Composer v2.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" integrity="sha384-tMH8h3BGESGckSAVGZ82T9n90ztNXxvdwvdM6UoR56cYcf+0iGXBliJ29D+wZ/x8" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" integrity="sha384-bm7MnzvK++ykSwVJ2tynSE5TRdN+xL418osEVF2DE/L/gfWHj91J2Sphe582B1Bh" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:#f3f4f6;color:#1e293b;overflow:hidden;height:100vh}

/* Layout */
.app{display:flex;flex-direction:column;height:100vh}
.header{background:#fff;border-bottom:1px solid #e5e7eb;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:14px}
.header-title{font-size:13px;font-weight:800;color:#111}
.header-sub{font-size:11px;color:#9ca3af}
.header-right{display:flex;gap:8px;align-items:center}

.header-mode-toggle{display:flex;gap:4px;align-items:center;margin-right:12px;padding-right:12px;border-right:1px solid #e5e7eb}
.mode-btn{border:none;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;background:#f3f4f6;color:#6b7280}
.mode-btn.active{background:#2563eb;color:#fff}
.mode-btn:hover:not(.active){background:#e5e7eb}

.main{display:flex;flex:1;overflow:hidden}
.footer{background:#fff;border-top:1px solid #e5e7eb;padding:5px 16px;display:flex;justify-content:space-between;font-size:11px;color:#9ca3af;flex-shrink:0}

/* Sidebar */
.sidebar{width:280px;background:#fff;border-right:1px solid #e5e7eb;padding:12px;overflow-y:auto;flex-shrink:0}
.sidebar-section{margin-bottom:20px}
.sidebar-section-header{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 0;user-select:none;transition:all .15s}
.sidebar-section-header:hover{color:#334151}
.sidebar-section-title{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:1.2px;flex:1}
.sidebar-section-toggle{width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:#9ca3af}
.sidebar-section-toggle.open{transform:rotate(180deg)}
.sidebar-section-content{margin-top:8px;border-top:1px solid #f3f4f6;padding-top:8px}

/* Text block buttons */
.add-btn{width:100%;display:flex;align-items:center;gap:8px;padding:7px 8px;border:none;background:transparent;border-radius:8px;cursor:pointer;text-align:left;transition:background .15s}
.add-btn:hover{background:#f3f4f6}
.add-btn-icon{width:44px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.add-btn-label{font-size:11px;font-weight:600;color:#374151}
.add-btn-desc{font-size:9px;color:#9ca3af;line-height:1.3;margin-top:1px}

/* Product block buttons */
.product-block-btn{width:100%;display:flex;align-items:stretch;border:none;background:#fff;border-radius:8px;cursor:pointer;margin-bottom:8px;transition:all .15s;border:1px solid #e5e7eb;overflow:hidden}
.product-block-btn:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08);border-color:#d1d5db}
.product-block-btn-border{width:4px;background:#999;flex-shrink:0}
.product-block-btn-border.blue{background:#3b82f6}
.product-block-btn-border.purple{background:#8b5cf6}
.product-block-btn-border.orange{background:#f97316}
.product-block-btn-border.gray{background:#64748b}
.product-block-btn-content{display:flex;flex-direction:column;justify-content:center;padding:8px 12px;flex:1;text-align:left}
.product-block-btn-title{font-size:11px;font-weight:700;color:#1f2937}
.product-block-btn-desc{font-size:9px;color:#6b7280;margin-top:2px}
.product-block-btn-price{font-size:8px;color:#9ca3af;margin-top:2px}

/* Template section */
.template-section{margin-top:20px;padding-top:12px;border-top:1px solid #f3f4f6}
.tpl-btn{width:100%;padding:8px;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;margin-bottom:4px;transition:all .15s}
.tpl-blue{background:#eff6ff;color:#1d4ed8}.tpl-blue:hover{background:#dbeafe}
.tpl-orange{background:#fff7ed;color:#c2410c}.tpl-orange:hover{background:#ffedd5}
.tpl-purple{background:#f5f3ff;color:#6d28d9}.tpl-purple:hover{background:#ede9fe}
.tpl-gray{background:#f3f4f6;color:#475569}.tpl-gray:hover{background:#e5e7eb}

/* Editor panel */
.editor{flex:1;padding:16px;overflow-y:auto}
.editor-inner{max-width:500px;margin:0 auto}
.empty-state{text-align:center;padding:60px 20px;color:#9ca3af}
.empty-icon{font-size:40px;opacity:.4;margin-bottom:12px}

/* Block card */
.block-card{background:#fff;border-radius:8px;border:1px solid #e5e7eb;border-left:4px solid #9ca3af;margin-bottom:8px;overflow:hidden}
.block-card.blue{border-left-color:#3b82f6}
.block-card.purple{border-left-color:#8b5cf6}
.block-card.orange{border-left-color:#f97316}
.block-card.green{border-left-color:#22c55e}
.block-card.cyan{border-left-color:#06b6d4}
.block-card.dark{border-left-color:#475569}

.block-header{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#f9fafb;border-bottom:1px solid #f3f4f6}
.block-header-left{display:flex;align-items:center;gap:6px}
.block-type-icon{font-size:12px}
.block-type-label{font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.8px}
.block-actions{display:flex;align-items:center;gap:2px}
.block-actions button{border:none;background:transparent;cursor:pointer;padding:3px;color:#9ca3af;border-radius:4px;display:flex;align-items:center;transition:color .15s}
.block-actions button:hover{color:#374151}
.block-actions button:disabled{opacity:.25;cursor:default}
.block-actions .del-btn:hover{color:#ef4444}

.block-body{padding:8px 10px}
.block-body textarea{width:100%;border:1px solid #e5e7eb;border-radius:6px;padding:8px;font-size:12px;font-family:inherit;resize:vertical;min-height:70px;outline:none;line-height:1.5}
.block-body textarea:focus{border-color:#93c5fd;box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.block-body select{font-size:11px;border:1px solid #d1d5db;border-radius:6px;padding:4px 8px;background:#fff;outline:none}
.block-body select:focus{border-color:#93c5fd}
.block-body .prod-selectors{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.block-body .prod-selectors label{font-size:10px;color:#9ca3af;display:flex;align-items:center;gap:4px}
.block-body .fixed-msg{font-size:11px;color:#9ca3af;font-style:italic}

/* Preview */
.preview-panel{width:50%;border-left:1px solid #e5e7eb;background:#fff;overflow-y:auto;display:flex;flex-direction:column}
.preview-header{position:sticky;top:0;background:#fff;border-bottom:1px solid #f3f4f6;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;z-index:10}
.preview-label{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:1px}
.preview-content{padding:16px;flex:1}
.preview-frame{border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}
.html-code{padding:16px;font-family:'Menlo','Monaco','Courier New',monospace;font-size:10px;line-height:1.6;color:#475569;white-space:pre-wrap;word-break:break-all;overflow-x:auto}

/* Buttons */
.btn{border:none;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-success{background:#22c55e;color:#fff}
.btn-ghost{background:#f3f4f6;color:#6b7280}.btn-ghost:hover{background:#e5e7eb}
.btn-toggle{background:#eff6ff;color:#2563eb}
.btn-toggle.off{background:#f3f4f6;color:#9ca3af}
.btn-sm{padding:4px 10px;font-size:10px}
.btn-danger{background:#fecaca;color:#991b1b}.btn-danger:hover{background:#fca5a5}

.lang-tabs{display:flex;gap:0;border-bottom:1px solid #e5e7eb;margin-bottom:16px}
.lang-tab{padding:8px 14px;border:none;background:transparent;cursor:pointer;font-size:11px;font-weight:700;color:#6b7280;border-bottom:2px solid transparent;transition:all .15s}
.lang-tab:hover{color:#374151}
.lang-tab.active{color:#2563eb;border-bottom-color:#2563eb}

.lang-selector{display:flex;gap:2px;margin-right:12px;padding-right:12px;border-right:1px solid #e5e7eb}
.brand-filter-bar{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.brand-filter-btn{padding:4px 12px;border-radius:16px;border:1px solid #e5e7eb;background:#fff;font-size:12px;cursor:pointer;transition:all .15s;color:#6b7280}
.brand-filter-btn:hover{background:#f3f4f6}
.brand-filter-btn.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.ai-prompt-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1100}
.ai-prompt-box{background:#fff;border-radius:12px;padding:24px;width:420px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.ai-prompt-box h3{margin:0 0 12px;font-size:16px;font-weight:700}
.ai-prompt-box textarea{width:100%;min-height:80px;border:1.5px solid #d1d5db;border-radius:8px;padding:10px;font-size:13px;font-family:inherit;resize:vertical;outline:none}
.ai-prompt-box textarea:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.ai-prompt-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.ai-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.ai-btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.ai-btn-primary:hover{opacity:.9}
.ai-btn-primary:disabled{opacity:.5;cursor:not-allowed}
.ai-btn-ghost{background:#f3f4f6;color:#374151}
.ai-btn-ghost:hover{background:#e5e7eb}
.lang-btn{border:none;padding:4px 8px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;background:#f3f4f6;color:#6b7280}
.lang-btn.active{background:#2563eb;color:#fff}
.lang-btn:hover:not(.active){background:#e5e7eb}

/* RICH TEXT EDITOR */
.rte-toolbar{display:flex;flex-wrap:wrap;gap:2px;padding:4px 6px;background:#f9fafb;border:1px solid #e5e7eb;border-bottom:none;border-radius:8px 8px 0 0}
.rte-toolbar button,.rte-toolbar select{border:1px solid transparent;background:transparent;cursor:pointer;padding:3px 6px;border-radius:4px;font-size:12px;color:#374151;transition:all .12s;font-family:inherit}
.rte-toolbar button:hover{background:#e5e7eb}
.rte-toolbar button.active{background:#2563eb;color:#fff}
.rte-toolbar select{font-size:10px;padding:2px 4px;border:1px solid #d1d5db;border-radius:4px;background:#fff}
.rte-toolbar .rte-sep{width:1px;background:#d1d5db;margin:2px 4px;align-self:stretch}
.rte-content{min-height:80px;padding:10px 12px;border:1px solid #e5e7eb;border-radius:0 0 8px 8px;outline:none;font-size:13px;line-height:1.6;color:#1e293b;background:#fff;overflow-y:auto;max-height:300px}
.rte-content:focus{border-color:#93c5fd;box-shadow:0 0 0 2px rgba(37,99,235,.12)}
.rte-content h1{font-size:22px;font-weight:800;margin:0 0 8px;color:#0f172a}
.rte-content h2{font-size:18px;font-weight:700;margin:0 0 6px;color:#1e293b}
.rte-content h3{font-size:15px;font-weight:700;margin:0 0 4px;color:#374151}
.rte-content p{margin:0 0 8px}
.rte-content ul,.rte-content ol{margin:0 0 8px;padding-left:20px}
.rte-content a{color:#2563eb;text-decoration:underline}

/* LOCK/UNLOCK BUTTON */
.lock-btn{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 8px;border-radius:12px;border:1px solid #d1d5db;background:#f9fafb;cursor:pointer;color:#6b7280;transition:all .15s}
.lock-btn:hover{background:#e5e7eb}
.lock-btn.unlocked{background:#dcfce7;border-color:#86efac;color:#16a34a}

/* TYPE FILTER */
.type-filter-bar{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px}
.type-filter-btn{border:none;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:600;cursor:pointer;transition:all .15s;background:#f3f4f6;color:#6b7280}
.type-filter-btn:hover{background:#e5e7eb}
.type-filter-btn.active{background:#2563eb;color:#fff}

/* BACKOFFICE STYLES */
.backoffice-container{display:flex;flex-direction:column;flex:1;width:100%;overflow:hidden}
.backoffice-tabs{display:flex;gap:0;border-bottom:1px solid #e5e7eb;background:#fff;padding:0 16px;flex-shrink:0}
.backoffice-tab{padding:12px 16px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:#6b7280;transition:all .2s;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.5px}
.backoffice-tab:hover{color:#374151}
.backoffice-tab.active{color:#2563eb;border-bottom-color:#2563eb}

.backoffice-content{flex:1;overflow-y:auto;padding:16px}
.backoffice-actions{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}

.data-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}
.data-table thead{background:#f9fafb;border-bottom:1px solid #e5e7eb}
.data-table th{padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px}
.data-table td{padding:12px 16px;border-bottom:1px solid #f3f4f6;font-size:12px}
.data-table tr:last-child td{border-bottom:none}
.data-table tbody tr:hover{background:#f9fafb}

.product-thumb{width:40px;height:40px;border-radius:4px;object-fit:contain;background:#f3f4f6;padding:2px}

.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:6px}
.form-input,.form-textarea,.form-select,.form-color{width:100%;padding:10px 14px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s;background:#fff}
.form-input:focus,.form-textarea:focus,.form-select:focus,.form-color:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.form-textarea{resize:vertical;min-height:80px}
.form-input:disabled{background:#f3f4f6;color:#9ca3af}
.form-color{cursor:pointer}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-panel{background:#fff;border-radius:16px;padding:0;width:90vw;max-width:800px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 50px -12px rgba(0,0,0,0.25)}
.modal-header{font-size:18px;font-weight:800;color:#0f172a;padding:20px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e5e7eb;position:sticky;top:0;background:#fff;z-index:5;border-radius:16px 16px 0 0}
.modal-body{padding:24px 28px}
.modal-close{background:#f3f4f6;border:none;color:#6b7280;cursor:pointer;font-size:16px;padding:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:all .15s}
.modal-close:hover{color:#111827;background:#e5e7eb}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;padding:16px 28px;border-top:1px solid #e5e7eb;position:sticky;bottom:0;background:#fff;border-radius:0 0 16px 16px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 20px}
.modal-grid .form-group-full{grid-column:1/-1}

.image-preview{max-width:150px;max-height:120px;border:1px solid #e5e7eb;border-radius:6px;margin-top:8px}

.list-item{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.list-item-info{flex:1}
.list-item-actions{display:flex;gap:4px}

.tab-content{display:none}
.tab-content.active{display:block}

.color-tag{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:6px}
.color-tag.blue{background:#3b82f6}
.color-tag.purple{background:#8b5cf6}
.color-tag.orange{background:#f97316}
.color-tag.gray{background:#64748b}

.block-list-item{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:start}
.block-list-content{flex:1}
.block-list-title{font-weight:600;margin-bottom:4px;font-size:12px}
.block-list-desc{font-size:11px;color:#6b7280;margin-bottom:6px}

/* Responsive */
@media(max-width:900px){
  .sidebar{width:280px}
  .preview-panel{display:none}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>

      if (srcCb.i18n && srcCb.i18n[lang] && srcCb.i18n[lang].introText) return srcCb.i18n[lang].introText;
      return srcCb.introText || '';
    }
  }

  // 3. Manual blocks: _overrides.es has the ES text, other langs in _overrides too
  if (block._sourceType === 'manual') {
    if (block._overrides && block._overrides[lang]) return block._overrides[lang];
    if (block._overrides && block._overrides.es) return block._overrides.es;
    return block.text || '';
  }

  // 4. Backward compat: old-style blocks with i18n/text directly
  if (block.i18n) return getLocalizedText(block, 'text', lang);
  return block.text || '';
}

    result.heroImageLink = srcConfig.heroImageLink || result.heroImageLink;
    result.heroBgColor = srcConfig.heroBgColor || result.heroBgColor;

    // Apply i18n from source
    if (lang && lang !== 'es' && srcConfig.i18n && srcConfig.i18n[lang]) {
      var hi = srcConfig.i18n[lang];
      if (hi.heroTitle) result.heroTitle = hi.heroTitle;
      if (hi.heroSubtitle) result.heroSubtitle = hi.heroSubtitle;
      if (hi.heroBullets) result.heroBullets = hi.heroBullets;

    }
  } else if (block.i18n && lang && lang !== 'es' && block.i18n[lang]) {
    // Old-style i18n directly on block
    var bhi = block.i18n[lang];
    if (bhi.heroTitle) result.heroTitle = bhi.heroTitle;
    if (bhi.heroSubtitle) result.heroSubtitle = bhi.heroSubtitle;
    if (bhi.heroBullets) result.heroBullets = bhi.heroBullets;
    if (bhi.heroCtaText) result.heroCtaText = bhi.heroCtaText;
  }

  // Apply _overrides (user edits in compositor)
  if (block._overrides && block._overrides[lang]) {
    var ovr = block._overrides[lang];
    if (typeof ovr === 'object') {
      if (ovr.heroTitle) result.heroTitle = ovr.heroTitle;
      if (ovr.heroSubtitle) result.heroSubtitle = ovr.heroSubtitle;
      if (ovr.heroBullets) result.heroBullets = ovr.heroBullets;
      if (ovr.heroCtaText) result.heroCtaText = ovr.heroCtaText;
    }
  }

  return result;
}

// Merge i18n translations from defaults into loaded data (so Supabase/localStorage data gets translations)
function mergeI18nFromDefaults(loadedData) {
  var defaults = getDefaultState();
  // Merge products i18n
  if (loadedData.products && defaults.products) {
    var defaultMap = {};
    defaults.products.forEach(function(dp){ defaultMap[dp.id] = dp; });
    loadedData.products = loadedData.products.map(function(p) {
      var dp = defaultMap[p.id];
      if (dp && dp.i18n && !p.i18n) { p.i18n = dp.i18n; }
      return p;
    });
  }
  // Merge composedBlocks i18n
  if (loadedData.composedBlocks && defaults.composedBlocks) {
    var blockMap = {};
    defaults.composedBlocks.forEach(function(db){ blockMap[db.id] = db; });
    loadedData.composedBlocks = loadedData.composedBlocks.map(function(b) {
      var db = blockMap[b.id];
      if (db && db.i18n && !b.i18n) { b.i18n = db.i18n; }
      return b;
    });
  }
  // Merge prewrittenTexts i18n
  if (loadedData.prewrittenTexts && defaults.prewrittenTexts) {
    var textMap = {};
    defaults.prewrittenTexts.forEach(function(dt){ textMap[dt.id] = dt; });
    loadedData.prewrittenTexts = loadedData.prewrittenTexts.map(function(t) {
      var dt = textMap[t.id];
      if (dt && dt.i18n && !t.i18n) { t.i18n = dt.i18n; }
      return t;
    });
  }
  // Merge standaloneBlocks i18n (hero blocks with config.i18n)
  if (loadedData.standaloneBlocks && defaults.standaloneBlocks) {
    var sbMap = {};
    defaults.standaloneBlocks.forEach(function(dsb){ sbMap[dsb.id] = dsb; });
    loadedData.standaloneBlocks = loadedData.standaloneBlocks.map(function(sb) {
      var dsb = sbMap[sb.id];
      if (dsb && dsb.config && dsb.config.i18n && sb.config && !sb.config.i18n) { sb.config.i18n = dsb.config.i18n; }
      return sb;
    });
  }
  // Merge composedBlocks innerBlocks i18n (hero/text innerBlocks)
  if (loadedData.composedBlocks && defaults.composedBlocks) {
    var cbMap = {};
    defaults.composedBlocks.forEach(function(dcb){ cbMap[dcb.id] = dcb; });
    loadedData.composedBlocks = loadedData.composedBlocks.map(function(cb) {
      var dcb = cbMap[cb.id];
      if (dcb && dcb.innerBlocks && cb.innerBlocks) {
        cb.innerBlocks = cb.innerBlocks.map(function(ib, idx) {
          var dib = dcb.innerBlocks[idx];
          if (dib && dib.i18n && !ib.i18n) { ib.i18n = dib.i18n; }
          return ib;
        });
      }
      return cb;
    });
  }
  return loadedData;
}

function supabaseFetch(method, body) {
  var url = SUPABASE_URL + '/rest/v1/' + SUPABASE_TABLE + '?id=eq.' + SUPABASE_ROW_ID;
  var opts = {
    method: method,

      'Content-Type': 'application/json',
      'Prefer': method === 'GET' ? '' : 'return=minimal'

  };
  if (method === 'GET') {
    url = SUPABASE_URL + '/rest/v1/' + SUPABASE_TABLE + '?select=data&id=eq.' + SUPABASE_ROW_ID;
    delete opts.headers['Prefer'];
  }
  if (body) opts.body = JSON.stringify(body);
  return fetch(url, opts);
}

function loadFromSupabase() {

// ─── SUPABASE BACKUPS ───────────────────────────────────────
function supabaseBackupFetch(method, rowId, body) {
  var url = SUPABASE_URL + '/rest/v1/' + SUPABASE_TABLE;
  if (method === 'GET') {
    url += '?select=id,updated_at&id=like.backup_%&order=updated_at.desc&limit=10';
  } else if (method === 'POST') {
    // Insert new row — use Prefer: return=minimal
  } else {
    url += '?id=eq.' + rowId;
  }
  var opts = {
    method: method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=minimal' : (method === 'GET' ? '' : 'return=minimal')
    }
  };
  if (method === 'GET') { delete opts.headers['Prefer']; }
  if (body) opts.body = JSON.stringify(body);
  return fetch(url, opts);
}

function saveBackupToSupabase(data, reason) {
  var backupId = 'backup_' + Date.now();
  var body = { id: backupId, data: data, updated_at: new Date().toISOString() };
  supabaseBackupFetch('POST', null, body).then(function(r) {
    if (!r.ok) {
      // If POST fails (row might exist), silently fail
      console.log('Supabase backup save status:', r.status);
    } else {
      console.log('Supabase backup saved:', backupId, '(' + reason + ')');
    }
    // Cleanup: keep max 5 backups in Supabase
    pruneSupabaseBackups();
  }).catch(function(e) { console.error('Supabase backup error:', e); });
  return backupId;
}

function pruneSupabaseBackups() {
  supabaseBackupFetch('GET').then(function(r){ return r.json(); }).then(function(rows) {
    if (rows && rows.length > 5) {
      var toDelete = rows.slice(5);
      toDelete.forEach(function(row) {
        var delUrl = SUPABASE_URL + '/rest/v1/' + SUPABASE_TABLE + '?id=eq.' + row.id;
        fetch(delUrl, { method:'DELETE', headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY} });
      });
    }
  }).catch(function(){});
}

function listSupabaseBackups() {
  return supabaseBackupFetch('GET').then(function(r){ return r.json(); }).then(function(rows) {
    return (rows || []).map(function(row) {
      return { id: row.id, date: row.updated_at };
    });
  }).catch(function(){ return []; });
}

function loadSupabaseBackup(backupId) {
  var url = SUPABASE_URL + '/rest/v1/' + SUPABASE_TABLE + '?select=data&id=eq.' + backupId;
  return fetch(url, {
    headers: {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}

}

      {id:'block-008',title:'MBO Gran Formato Industrial UV1612G+UV1812+UV2513',desc:'Línea de producción masiva',priceRange:'desde 26.500 € + 27.500 € + 34.000 €',colorTag:'purple',introText:'Cuando necesitas línea de producción real: el dúo UV1612G+UV1812 para volumen medio-alto, o el salto a la UV2513 para producción masiva (250×130 cm). Cabezales de alta velocidad, rígidos y flexibles, CMYK+W+Barniz. Esto es factorización industrial:',brandStrip:'mbo',blockType:'product_trio',products:['uv1612g','uv1812','uv2513'],includeHero:false,includeSteps:false,visible:true,i18n:{fr:{introText:'Quand il vous faut une vraie ligne de production : le duo UV1612G+UV1812 pour le volume moyen-haut, ou le passage à la UV2513 pour la production massive (250×130 cm). Têtes haute vitesse, rigides et souples, CMYK+W+Vernis :'},de:{introText:'Wenn Sie eine echte Produktionslinie brauchen: Das Duo UV1612G+UV1812 für mittleres bis hohes Volumen, oder der Sprung zur UV2513 für Massenproduktion (250×130 cm). Hochgeschwindigkeits-Druckköpfe, starre und flexible Materialien, CMYK+W+Lack:'},en:{introText:'When you need a real production line: the UV1612G+UV1812 duo for medium-to-high volume, or the step up to the UV2513 for mass production (250×130 cm). High-speed printheads, rigid and flexible materials, CMYK+W+Varnish:'},nl:{introText:'Wanneer u een echte productielijn nodig heeft: het UV1612G+UV1812-duo voor middelhoog volume, of de stap naar de UV2513 voor massaproductie (250×130 cm). Hogesnelheidsprintkoppen, stijve en flexibele materialen, CMYK+W+Lak:'}}},
      {id:'block-009',title:'PimPam Vending CaseBox+Custom',desc:'Autoservicio impreso 24/7',priceRange:'Consultar',colorTag:'orange',introText:'PimPam es el vending con personalización UV-LED integrada. Sin operario. El cliente elige, personaliza su funda, paga y se la lleva en 30 segundos. CaseBox para retail/interiores, Custom para branding completo con tus vinilos y campañas temporales:',brandStrip:'pimpam',blockType:'product_pair',products:['casebox','custom'],includeHero:true,includeSteps:false,visible:true,i18n:{fr:{introText:'PimPam, c\'est le vending avec personnalisation UV-LED intégrée. Sans opérateur. Le client choisit, personnalise sa coque, paie et repart en 30 secondes. CaseBox pour le retail/intérieur, Custom pour un branding complet avec vos visuels :'},de:{introText:'PimPam ist Vending mit integrierter UV-LED-Personalisierung. Ohne Personal. Der Kunde wählt, personalisiert seine Hülle, bezahlt und nimmt sie in 30 Sekunden mit. CaseBox für Retail/Innenräume, Custom für komplettes Branding mit Ihren Designs:'},en:{introText:'PimPam is vending with integrated UV-LED customization. No operator needed. The customer picks a design, personalizes their case, pays and takes it away in 30 seconds. CaseBox for retail/indoors, Custom for full branding with your visuals:'},nl:{introText:'PimPam is vending met geïntegreerde UV-LED-personalisatie. Geen personeel nodig. De klant kiest een ontwerp, personaliseert het hoesje, betaalt en neemt het mee in 30 seconden. CaseBox voor retail/binnen, Custom voor volledig branding met uw visuals:'}}},
      {id:'block-010',title:'Complemento Vending artisJet Young',desc:'Impresión manual + autoservicio híbrido',priceRange:'9.300 €',colorTag:'orange',introText:'Para negocios que quieren combinar: una Young en mostrador (operario imprime en el acto) + una PimPam en zona común (autoservicio). Máxima flexibilidad, dos modelos de negocio en paralelo, tiempos rápidos, márgenes altos:',brandStrip:'none',blockType:'product_single',products:['young'],includeHero:false,includeSteps:false,visible:true,i18n:{fr:{introText:'Pour les commerces qui veulent combiner : une Young au comptoir (un opérateur imprime sur place) + une PimPam en zone publique (libre-service). Flexibilité maximale, deux modèles d\'affaires en parallèle, délais rapides, marges élevées :'},de:{introText:'Für Unternehmen, die kombinieren möchten: Eine Young an der Theke (Bediener druckt sofort) + eine PimPam im öffentlichen Bereich (Selbstbedienung). Maximale Flexibilität, zwei Geschäftsmodelle parallel, kurze Zeiten, hohe Margen:'},en:{introText:'For businesses that want to combine: a Young at the counter (operator prints on the spot) + a PimPam in a public area (self-service). Maximum flexibility, two business models in parallel, fast turnaround, high margins:'},nl:{introText:'Voor bedrijven die willen combineren: een Young aan de balie (operator print ter plekke) + een PimPam in een openbare ruimte (zelfbediening). Maximale flexibiliteit, twee businessmodellen parallel, snelle doorlooptijd, hoge marges:'}}},
      {id:'block-011',title:'Proceso PimPam 4 Pasos',desc:'El viaje del cliente en 30 segundos',priceRange:'-',colorTag:'orange',introText:'Esto es lo que ve el cliente: selecciona diseño, personaliza, paga, y se va con su funda. Sin esperas, sin complicaciones, sin personal. El "por qué" de PimPam. Aquí se convierte en negocio rentable.',brandStrip:'pimpam',blockType:'product_single',products:['young'],includeHero:false,includeSteps:true,visible:true,i18n:{fr:{introText:'Voici ce que voit le client : il choisit un design, le personnalise, paie, et repart avec sa coque. Sans attente, sans complication, sans personnel. Le « pourquoi » de PimPam — et ce qui en fait un business rentable.'},de:{introText:'Das sieht der Kunde: Design auswählen, personalisieren, bezahlen — und die Hülle mitnehmen. Keine Wartezeit, keine Komplikationen, kein Personal. Das ist das „Warum" von PimPam — und das macht es zum profitablen Geschäft.'},en:{introText:'This is what the customer sees: pick a design, customize it, pay, and walk away with their case. No waiting, no hassle, no staff needed. The "why" of PimPam — and what makes it a profitable business.'},nl:{introText:'Dit is wat de klant ziet: ontwerp kiezen, personaliseren, betalen en weglopen met het hoesje. Geen wachttijd, geen gedoe, geen personeel nodig. Het "waarom" van PimPam — en wat het een winstgevend bedrijf maakt.'}}},

    prewrittenTexts: [
      {id:'text-001',name:'Intro UV-LED',icon:'💡',brand:'mix',text:'Hola,\n\nTras nuestra conversación, te envío información sobre algunas de nuestras impresoras UV-LED que creo que encajan con lo que necesitas.\n\nLa tecnología UV-LED permite imprimir directamente sobre casi cualquier material (plástico, madera, metal, vidrio, cerámica…) con secado instantáneo y calidad fotorrealista en CMYK + blanco.',visible:true,i18n:{fr:{text:'Bonjour,\n\nSuite à notre échange, je vous envoie les informations sur quelques-unes de nos imprimantes UV-LED qui correspondent à vos besoins.\n\nLa technologie UV-LED permet d\'imprimer directement sur presque tous les matériaux (plastique, bois, métal, verre, céramique…) avec un séchage instantané et une qualité photoréaliste en CMYK + blanc.'},de:{text:'Hallo,\n\nnach unserem Gespräch sende ich Ihnen Informationen zu einigen unserer UV-LED-Drucker, die gut zu Ihren Anforderungen passen.\n\nMit UV-LED-Technologie drucken Sie direkt auf nahezu jedes Material (Kunststoff, Holz, Metall, Glas, Keramik…) — mit sofortiger Trocknung und fotorealistischer Qualität in CMYK + Weiß.'},en:{text:'Hi,\n\nFollowing our conversation, here\'s some information on a few of our UV-LED printers that I think match what you\'re looking for.\n\nUV-LED technology lets you print directly onto almost any material (plastic, wood, metal, glass, ceramics…) with instant curing and photorealistic quality in CMYK + white.'},nl:{text:'Hallo,\n\nNaar aanleiding van ons gesprek stuur ik u informatie over een aantal van onze UV-LED-printers die goed bij uw wensen passen.\n\nUV-LED-technologie maakt het mogelijk om rechtstreeks op vrijwel elk materiaal te printen (kunststof, hout, metaal, glas, keramiek…) met directe droging en fotorealistische kwaliteit in CMYK + wit.'}}},
      {id:'text-002',name:'Transición a MBO',icon:'▶',brand:'mbo',text:'En nuestra línea MBO (marca propia, excelente relación calidad-precio) también tenemos opciones interesantes:',visible:true,i18n:{fr:{text:'Dans notre gamme MBO (marque propre, excellent rapport qualité-prix), nous avons également des options intéressantes :'},de:{text:'In unserer MBO-Reihe (Eigenmarke, hervorragendes Preis-Leistungs-Verhältnis) haben wir ebenfalls interessante Optionen:'},en:{text:'In our MBO range (own brand, excellent value for money), we also have some interesting options:'},nl:{text:'In ons MBO-assortiment (eigen merk, uitstekende prijs-kwaliteitverhouding) hebben we ook interessante opties:'}}},
      {id:'text-003',name:'Transición a PimPam',icon:'🔹',brand:'pimpam',text:'Y si te interesa el concepto de vending con personalización automática, tenemos PimPam — máquinas que imprimen fundas de móvil al momento, sin operario:',visible:true,i18n:{fr:{text:'Et si le concept de vending avec personnalisation automatique vous intéresse, nous avons PimPam — des machines qui impriment des coques de téléphone à la demande, sans opérateur :'},de:{text:'Falls Sie das Konzept von Vending mit automatischer Personalisierung interessiert: Wir haben PimPam — Automaten, die Handyhüllen sofort bedrucken, ganz ohne Personal:'},en:{text:'And if you\'re interested in the concept of vending with automatic customization, we have PimPam — machines that print phone cases on the spot, with no operator needed:'},nl:{text:'En als u geïnteresseerd bent in vending met automatische personalisatie, dan hebben we PimPam — machines die telefoonhoesjes ter plekke bedrukken, zonder personeel:'}}},
      {id:'text-004',name:'Mención Freebird',icon:'✨',brand:'artisjet',text:'Por cierto, varios de estos equipos incluyen tecnología Freebird — un sensor láser que ajusta automáticamente la altura del cabezal para imprimir sobre objetos 3D irregulares:',visible:true,i18n:{fr:{text:'À noter : plusieurs de ces machines intègrent la technologie Freebird — un capteur laser qui ajuste automatiquement la hauteur de la tête d\'impression pour imprimer sur des objets 3D irréguliers :'},de:{text:'Übrigens: Mehrere dieser Geräte verfügen über die Freebird-Technologie — ein Lasersensor, der die Druckkopfhöhe automatisch anpasst, um auf unregelmäßigen 3D-Objekten zu drucken:'},en:{text:'By the way, several of these machines include Freebird technology — a laser sensor that automatically adjusts the printhead height to print on irregular 3D objects:'},nl:{text:'Overigens: meerdere van deze machines beschikken over Freebird-technologie — een lasersensor die automatisch de printkophoogte aanpast om op onregelmatige 3D-objecten te printen:'}}},
      {id:'text-005',name:'Cierre comercial',icon:'👋',brand:'mix',text:'Si quieres, podemos organizar una demo (presencial o videollamada) para que veas cualquiera de estos equipos en funcionamiento. También te puedo enviar muestras impresas sin compromiso.\n\n¡Quedo a tu disposición!\nUn saludo,',visible:true,i18n:{fr:{text:'Si vous le souhaitez, nous pouvons organiser une démonstration (sur place ou en visioconférence) pour voir ces machines en action. Je peux également vous envoyer des échantillons imprimés sans engagement.\n\nÀ votre disposition !\nCordialement,'},de:{text:'Gerne können wir eine Demo organisieren (vor Ort oder per Videocall), damit Sie die Geräte in Aktion sehen. Ich kann Ihnen auch gerne gedruckte Muster unverbindlich zusenden.\n\nIch stehe Ihnen jederzeit zur Verfügung!\nMit freundlichen Grüßen,'},en:{text:'If you\'d like, we can arrange a demo (on-site or video call) so you can see any of these machines in action. I can also send you printed samples with no obligation.\n\nLooking forward to hearing from you!\nBest regards,'},nl:{text:'Als u wilt, kunnen we een demo organiseren (op locatie of via videocall) zodat u deze machines in actie kunt zien. Ik kan u ook vrijblijvend gedrukte samples sturen.\n\nIk sta tot uw beschikking!\nMet vriendelijke groet,'}}},

let blockIdCounter = 0;
function createBlock(type) {
  var id = ++blockIdCounter;
  switch(type) {
    case "text": return { id:id, type:type, _sourceType:'manual', _overrides:{es:"Hola,\n\nEscribe aquí tu texto personalizado."} };
    case "brand_artisjet": return { id:id, type:type, brand:"artisjet" };
    case "brand_mbo": return { id:id, type:type, brand:"mbo" };
    case "brand_pimpam": return { id:id, type:type, brand:"pimpam" };
    case "brand_flux": return { id:id, type:type, brand:"flux" };
    case "product_single": return { id:id, type:type, product1:"young" };
    case "product_pair": return { id:id, type:type, product1:"young", product2:"3000pro" };
    case "product_trio": return { id:id, type:type, product1:"uv1612g", product2:"uv1812", product3:"uv2513" };
    case "freebird": return { id:id, type:type };
    case "pimpam_hero": return { id:id, type:type };
    case "pimpam_steps": return { id:id, type:type };
    default: return { id:id, type:type };
  }
}

function productCardHtml(p, lang) {
  var areaLabel = lang==='fr'?'Surface':lang==='de'?'Fläche':lang==='en'?'Area':lang==='nl'?'Oppervlak':'Área';
  var altLabel = lang==='fr'?'Haut. max.':lang==='de'?'Max. Höhe':lang==='en'?'Max. height':lang==='nl'?'Max. hoogte':'Alt. máx.';
  var areaBlock = '';
  if (p.area !== '-') {
    areaBlock = '<table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin:6px 0">' +
      '<tr><td width="38%" style="font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase">' + areaLabel + '</td><td style="font-size:10px;font-weight:700;color:#334155">' + p.area + '</td></tr>' +
      (p.alt !== '-' ? '<tr><td style="font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase">' + altLabel + '</td><td style="font-size:10px;font-weight:700;color:#334155">' + p.alt + '</td></tr>' : '') +
      '</table>';
  }
  var priceExtra = p.price !== 'Consultar' && p.price !== 'Sur demande' && p.price !== 'Auf Anfrage' && p.price !== 'On request' && p.price !== 'Op aanvraag' ? ' <span style="font-size:10px;font-weight:500;color:#475569">' + (lang==='fr'?'+ TVA':lang==='de'?'+ MwSt':lang==='en'?'+ VAT':lang==='nl'?'+ BTW':'+ IVA') + '</span>' : '';
  var ctaLabel = p.brand === 'pimpam' ? (lang==='fr'?'Détails':lang==='de'?'Details':lang==='en'?'Details':lang==='nl'?'Details':'Detalles') : (lang==='fr'?'Plus d\'infos':lang==='de'?'Mehr Infos':lang==='en'?'More info':lang==='nl'?'Meer info':'Más info');
  var bgExtra = p.brand === 'pimpam' ? ';background:#fff7ed' : '';
  return '<table width="100%" cellpadding="0" cellspacing="0" border="0" style="border:1.5px solid ' + (p.brand==='pimpam'?'#fed7aa':'#e2e8f0') + ';border-radius:12px;overflow:hidden;background:#fff">' +
    '<tr><td style="background:#fff;padding:16px 12px 8px;border-bottom:1px solid ' + (p.brand==='pimpam'?'#ffedd5':'#f1f5f9') + ';text-align:center">' +
    '<img src="' + p.img + '" width="160" alt="' + p.name + '" style="object-fit:contain;width:100%;max-width:160px;max-height:130px;height:auto">' +
    '</td></tr>' +
    '<tr><td style="padding:12px' + bgExtra + '">' +
    '<span style="display:inline-block;font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:20px;margin-bottom:6px;background:' + p.badgeBg + ';color:' + p.badgeColor + '">' + p.badge + '</span>' +
    '<p style="font-size:13px;font-weight:900;color:#0f172a;margin:0">' + p.name + '</p>' +
    '<p style="font-size:10px;color:#64748b;margin:4px 0 0;line-height:1.45">' + p.desc + '</p>' +
    areaBlock +
    '<p style="font-size:10px;color:#475569;padding:2px 0;margin:' + (p.area==='-'?'6px':'0') + ' 0 0">✓ ' + p.feat1 + '</p>' +
    '<p style="font-size:10px;color:#475569;padding:2px 0;margin:0">✓ ' + p.feat2 + '</p>' +
    '<p style="font-size:13px;font-weight:900;color:' + p.accent + ';margin:8px 0 0;text-align:center">' + p.price + priceExtra + '</p>' +
    '<a href="' + p.link + '" style="display:block;text-align:center;font-size:11px;font-weight:800;text-decoration:none;padding:9px 10px;border-radius:8px;text-transform:uppercase;background:' + p.gradient + ';color:#fff;margin-top:6px">' + ctaLabel + ' →</a>' +
    '</td></tr></table>';
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function textBlockHtml(text) {
  // Check if text contains HTML tags (from rich text editor)
  if (text && /<[a-z][\s\S]*>/i.test(text)) {
    // Rich HTML mode — sanitize and apply email-safe styles
    var richHtml = sanitizeHtml(text);
    // Apply inline styles for email compatibility
    richHtml = richHtml.replace(/<h1[^>]*>/gi, '<h1 style="font-size:22px;font-weight:800;color:#0f172a;margin:0 0 12px;font-family:system-ui,sans-serif">');
    richHtml = richHtml.replace(/<h2[^>]*>/gi, '<h2 style="font-size:18px;font-weight:700;color:#1e293b;margin:0 0 10px;font-family:system-ui,sans-serif">');
    richHtml = richHtml.replace(/<h3[^>]*>/gi, '<h3 style="font-size:15px;font-weight:700;color:#374151;margin:0 0 8px;font-family:system-ui,sans-serif">');
    richHtml = richHtml.replace(/<p[^>]*>/gi, '<p style="margin:0 0 14px">');
    richHtml = richHtml.replace(/<ul[^>]*>/gi, '<ul style="margin:0 0 14px;padding-left:20px">');
    richHtml = richHtml.replace(/<ol[^>]*>/gi, '<ol style="margin:0 0 14px;padding-left:20px">');
    richHtml = richHtml.replace(/<li[^>]*>/gi, '<li style="margin:0 0 4px">');
    richHtml = richHtml.replace(/<a /gi, '<a style="color:#2563eb;text-decoration:underline" ');
    return '<tr><td style="padding:16px 8px;font-size:14px;color:#1e293b;line-height:1.65">\n' + richHtml + '</td></tr>';
  }
  // Plain text mode (legacy)
  var lines = text.split('\n');
  var html = '';
  for (var i = 0; i < lines.length; i++) {
    if (lines[i].trim()) html += '<p style="margin:0 0 14px">' + escapeHtml(lines[i]) + '</p>\n';
  }
  return '<tr><td style="padding:16px 8px;font-size:14px;color:#1e293b;line-height:1.65">\n' + html + '</td></tr>';
}

  if (hexMatch) {

function generateFullHtml(blocks, products, lang, brands, appState) {
  lang = lang || 'es';
  appState = appState || {};
  var rows = '';

  function resolveText(block) {
    // Rich HTML from editor takes priority
    if (block._richHtml != null) return block._richHtml;
    // Reference-based: use getTextInLanguage if _sourceType exists
    if (block._sourceType) return getTextInLanguage(block, lang, appState);
    // Backward compat: old-style blocks
    if (block.i18n) return getLocalizedText(block, 'text', lang);
    return block.text || '';
  }

  function resolveHero(block) {
    if (block._sourceType) return getHeroDataInLanguage(block, lang, appState);
    // Backward compat: build config with i18n applied via pimpamHeroHtml
    return block;
  }

  for (var i = 0; i < blocks.length; i++) {
    var b = blocks[i];
    switch(b.type) {
      case 'text':
        var resolvedText = resolveText(b);
        if (resolvedText) rows += textBlockHtml(resolvedText);
        break;
      case 'brand_artisjet': rows += brandStripHtml(b.brand||'artisjet', lang, brands); break;
      case 'brand_mbo': rows += brandStripHtml(b.brand||'mbo', lang, brands); break;
      case 'brand_pimpam': rows += brandStripHtml(b.brand||'pimpam', lang, brands); break;
      case 'brand_flux': rows += brandStripHtml(b.brand||'flux', lang, brands); break;
      case 'product_single':
        var ps = products.find(function(p){return p.id===b.product1});
        if(ps) { ps = getLocalizedProduct(ps, lang); rows += productSingleHtml(ps, lang); }
        break;
      case 'product_pair':
        var p1 = products.find(function(p){return p.id===b.product1});
        var p2 = products.find(function(p){return p.id===b.product2});
        if(p1&&p2) { p1 = getLocalizedProduct(p1, lang); p2 = getLocalizedProduct(p2, lang); rows += productPairHtml(p1,p2,lang); }
        break;
      case 'product_trio':
        var pt1 = products.find(function(p){return p.id===b.product1});
        var pt2 = products.find(function(p){return p.id===b.product2});
        var pt3 = products.find(function(p){return p.id===b.product3});
        if(pt1&&pt2&&pt3) { pt1 = getLocalizedProduct(pt1, lang); pt2 = getLocalizedProduct(pt2, lang); pt3 = getLocalizedProduct(pt3, lang); rows += productTrioHtml(pt1,pt2,pt3,lang); }
        break;
      case 'freebird': rows += freebirdHtml(b, lang); break;
      case 'pimpam_hero':
        var heroData = resolveHero(b);
        if (heroData === b) {
          rows += pimpamHeroHtml(b, lang);
        } else {
          // heroData is resolved — build a config obj for pimpamHeroHtml (skip i18n since already resolved)
          rows += pimpamHeroHtml(heroData, null);
        }
        break;
      case 'pimpam_steps': rows += pimpamStepsHtml(b, lang); break;
      case 'composed':
        var ibs = b.innerBlocks || [];
        // Legacy support: if no innerBlocks, build from old fields
        if (ibs.length === 0) {
          if (b.introText) ibs.push({type:'text', text:b.introText});
          if (b.brandStrip && b.brandStrip !== 'none') ibs.push({type:'brand_strip', brand:b.brandStrip});
          if (b.includeHero) ibs.push({type:'pimpam_hero'});
          var cProds = b.products || [];
          if (b.blockType === 'product_trio' && cProds.length >= 3) ibs.push({type:'product_trio', product1:cProds[0], product2:cProds[1], product3:cProds[2]});
          else if (b.blockType === 'product_pair' && cProds.length >= 2) ibs.push({type:'product_pair', product1:cProds[0], product2:cProds[1]});
          else if (b.blockType === 'product_single' && cProds.length >= 1) ibs.push({type:'product_single', product1:cProds[0]});
          if (b.includeSteps) ibs.push({type:'pimpam_steps'});
        }
        ibs.forEach(function(ib) {
          if (ib.type === 'text') {
            var ibText = resolveText(ib);
            if (ibText) rows += textBlockHtml(ibText);
          } else if (ib.type === 'brand_strip' && ib.brand) {
            rows += brandStripHtml(ib.brand, lang, brands);
          } else if (ib.type === 'pimpam_hero') {
            var ibHero = resolveHero(ib);
            if (ibHero === ib) {
              rows += pimpamHeroHtml(ib.heroImage ? ib : b, lang);
            } else {
              rows += pimpamHeroHtml(ibHero, null);
            }
          } else if (ib.type === 'pimpam_steps') {
            rows += pimpamStepsHtml(ib.steps ? ib : b, lang);
          } else if (ib.type === 'separator') {
            rows += '<tr><td style="padding:8px 20px"><hr style="border:none;border-top:1px solid #e5e7eb;margin:0"></td></tr>';
          } else if (ib.type === 'product_trio') {
            var ct1 = products.find(function(p){return p.id===ib.product1});
            var ct2 = products.find(function(p){return p.id===ib.product2});
            var ct3 = products.find(function(p){return p.id===ib.product3});
            if(ct1&&ct2&&ct3) { ct1 = getLocalizedProduct(ct1,lang); ct2 = getLocalizedProduct(ct2,lang); ct3 = getLocalizedProduct(ct3,lang); rows += productTrioHtml(ct1,ct2,ct3,lang); }
          } else if (ib.type === 'product_pair') {
            var cp1 = products.find(function(p){return p.id===ib.product1});
            var cp2 = products.find(function(p){return p.id===ib.product2});
            if(cp1&&cp2) { cp1 = getLocalizedProduct(cp1,lang); cp2 = getLocalizedProduct(cp2,lang); rows += productPairHtml(cp1,cp2,lang); }
          } else if (ib.type === 'product_single') {
            var cps = products.find(function(p){return p.id===ib.product1});
            if(cps) { cps = getLocalizedProduct(cps,lang); rows += productSingleHtml(cps,lang); }
          }
        });
        break;
    }
  }
  return '<html><head>'+CSS_BLOCK+'</head><body style="font-family:\'Helvetica Neue\',Helvetica,Arial,sans-serif;margin:0;padding:0;background:#ffffff;color:#1e293b">' +
    '<table class="wrap" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin:0 auto">' + rows + '</table></body></html>';

    }

  // SHA-256 hash via Web Crypto API (async) — used for password verification
  function sha256Hash(str) {
    var encoder = new TextEncoder();
    var data = encoder.encode(str);
    return crypto.subtle.digest('SHA-256', data).then(function(buf) {
      var arr = Array.from(new Uint8Array(buf));
      return arr.map(function(b){ return b.toString(16).padStart(2, '0'); }).join('');
    });
  }

  var DEFAULT_DATA_HASH = '6fab52fdf6384db663c2aae68b921a907422f9bdd102fbd35a90fc71dc8423ea';

  // XSS sanitization for HTML preview
  function sanitizeHtml(html) {
    if (!html) return '';
    // Remove script tags and their content
    html = html.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
    // Remove event handlers (onclick, onerror, onload, onmouseover, etc.)
    html = html.replace(/\s+on\w+\s*=\s*(?:"[^"]*"|'[^']*'|[^\s>]+)/gi, '');
    // Remove javascript: protocol in href/src/action attributes
    html = html.replace(/(href|src|action)\s*=\s*(?:"javascript:[^"]*"|'javascript:[^']*')/gi, '$1=""');
    // Remove data: protocol in src (can be used for XSS)
    html = html.replace(/src\s*=\s*(?:"data:[^"]*"|'data:[^']*')/gi, 'src=""');
    // Remove iframe tags
    html = html.replace(/<iframe\b[^<]*(?:(?!<\/iframe>)<[^<]*)*<\/iframe>/gi, '');
    html = html.replace(/<iframe\b[^>]*\/?>/gi, '');

    var keys = Object.keys(obj);
    for (var i = 0; i < keys.length; i++) {

      var m = (b.type || '').match(/^brand_(.+)$/);
      if (m) { brandCounts[m[1]] = (brandCounts[m[1]]||0) + 1; }
      if (b.brandStrip && b.brandStrip !== 'none') { brandCounts[b.brandStrip] = (brandCounts[b.brandStrip]||0) + 1; }
    });
    var top = 'mix'; var max = 0;
    for (var k in brandCounts) { if (brandCounts[k] > max) { max = brandCounts[k]; top = k; } }
    return top;
  }

  function generateCampaignName(blocks, lang) {
    var now = new Date();
    var yy = String(now.getFullYear());
    var mm = String(now.getMonth()+1).padStart(2,'0');

    var brand = detectCampaignBrand(blocks);
    return yy + mm + dd + '-' + brand + '-' + lang;

  function addUtmParams(html, campaign, lang) {
    var utmBase = 'utm_source=email&utm_medium=bomedia&utm_campaign=' + encodeURIComponent(campaign) + '&utm_term=' + encodeURIComponent(lang);
    return html.replace(/<a\s([^>]*?)href="([^"]+)"([^>]*?)>/gi, function(match, pre, url, post) {
      // Skip mailto:, tel:, and # links
      if (/^(mailto:|tel:|#)/.test(url)) return match;
      var separator = url.indexOf('?') >= 0 ? '&' : '?';
      return '<a ' + pre + 'href="' + url + separator + utmBase + '"' + post + '>';
    });
  }

  function autoBackup(reason) {
    try {
      // Save to localStorage
      var backupKey = 'bomedia_backup_' + Date.now();
      var backupData = JSON.stringify(appState);
      localStorage.setItem(backupKey, backupData);
      var allKeys = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && k.indexOf('bomedia_backup_') === 0) allKeys.push(k);
      }
      allKeys.sort();
      while (allKeys.length > 5) { localStorage.removeItem(allKeys.shift()); }
      // Save to Supabase too
      saveBackupToSupabase(appState, reason);
      console.log('Auto-backup created: ' + backupKey + ' (' + reason + ')');
      return backupKey;
    } catch(e) {
      console.error('Auto-backup failed:', e);
      return null;
    }
  }

  function restoreBackup() {
    requireDataPassword(function(ok) {
    if (!ok) return;
    // Gather local backups
    var localKeys = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && k.indexOf('bomedia_backup_') === 0) localKeys.push(k);
    }
    localKeys.sort().reverse();
    // Also fetch Supabase backups
    listSupabaseBackups().then(function(sbBackups) {
      var entries = [];
      // Add local backups
      localKeys.forEach(function(k) {
        var ts = parseInt(k.replace('bomedia_backup_', ''));
        entries.push({source:'local', key:k, ts:ts, label:new Date(ts).toLocaleString() + ' (local)'});
      });
      // Add Supabase backups (avoid duplicates by timestamp)
      sbBackups.forEach(function(sb) {
        var ts = parseInt(sb.id.replace('backup_', ''));
        var isDupe = entries.some(function(e){ return Math.abs(e.ts - ts) < 2000; });
        if (!isDupe) {
          entries.push({source:'supabase', key:sb.id, ts:ts, label:new Date(ts).toLocaleString() + ' (nube)'});
        } else {
          // Mark existing local entry as also in cloud
          entries.forEach(function(e){ if (Math.abs(e.ts - ts) < 2000) e.label = e.label.replace(' (local)', ' (local+nube)'); });
        }
      });
      entries.sort(function(a,b){ return b.ts - a.ts; });
      if (entries.length === 0) { alert('No hay backups disponibles.'); return; }
      var msg = 'Backups disponibles:\n\n' + entries.map(function(e, idx) {
        return (idx+1) + ' — ' + e.label;
      }).join('\n') + '\n\nEscribe el número para restaurar (o vacío para cancelar):';
      var choice = window.prompt(msg);
      if (!choice) return;
      var idx = parseInt(choice) - 1;
      if (idx < 0 || idx >= entries.length) { alert('Opción no válida.'); return; }
      var entry = entries[idx];
      if (entry.source === 'local') {
        try {
          var data = sanitizeJsonObj(JSON.parse(localStorage.getItem(entry.key)));
          if (data && window.confirm('¿Restaurar backup del ' + new Date(entry.ts).toLocaleString() + '?')) {
            persistState(data);
            alert('Backup restaurado.');
          }
        } catch(e) { alert('Error: ' + e.message); }
      } else {
        // Load from Supabase
        loadSupabaseBackup(entry.key).then(function(data) {
          if (data && window.confirm('¿Restaurar backup del ' + new Date(entry.ts).toLocaleString() + ' (nube)?')) {
            persistState(data);
            alert('Backup restaurado desde la nube.');
          } else if (!data) {
            alert('No se pudo cargar el backup de la nube.');
          }
        });
      }
    });
    }); // end requireDataPassword callback
  }

  function importJSON() {
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = function(e) {
      requireDataPassword(function(ok) {
      if (!ok) return;
      autoBackup('pre-import');
      var file = e.target.files[0];
      var reader = new FileReader();
      reader.onload = function(evt) {
        try {
          var data = sanitizeJsonObj(JSON.parse(evt.target.result));
          var choice = window.prompt('¿Qué quieres hacer?\n\n1 = Fusionar (añade lo nuevo, actualiza duplicados)\n2 = Reemplazar todo\n\nEscribe 1 o 2 (o vacío para cancelar):');
          if (choice === '1') {
            // Merge mode: combine arrays by id
            var merged = Object.assign({}, appState);
            merged.brands = mergeArrayById(merged.brands || [], data.brands);
            merged.products = mergeArrayById(merged.products || [], data.products);
            merged.composedBlocks = mergeArrayById(merged.composedBlocks || [], data.composedBlocks);
            merged.prewrittenTexts = mergeArrayById(merged.prewrittenTexts || [], data.prewrittenTexts);
            merged.standaloneBlocks = mergeArrayById(merged.standaloneBlocks || [], data.standaloneBlocks);
            merged.templates = mergeArrayById(merged.templates || [], data.templates);
            persistState(merged);
            var counts = [];
            if (data.brands && data.brands.length) counts.push(data.brands.length + ' marcas');
            if (data.products && data.products.length) counts.push(data.products.length + ' productos');
            if (data.composedBlocks && data.composedBlocks.length) counts.push(data.composedBlocks.length + ' bloques');
            if (data.prewrittenTexts && data.prewrittenTexts.length) counts.push(data.prewrittenTexts.length + ' textos');
            if (data.standaloneBlocks && data.standaloneBlocks.length) counts.push(data.standaloneBlocks.length + ' bloques sueltos');
            if (data.templates && data.templates.length) counts.push(data.templates.length + ' plantillas');
            alert('Fusión completada: ' + counts.join(', '));
          } else if (choice === '2') {
            persistState(data);
            alert('Configuración reemplazada correctamente');
          } else {
            alert('Importación cancelada');
          }
        } catch(err) {
          alert('Error al importar JSON: ' + err.message);
        }
      };
      reader.readAsText(file);
      }); // end requireDataPassword callback
    };
    input.click();
  }

          e('div', {className:'brand-filter-bar'},
            e('button', {className:'brand-filter-btn' + (brandFilter==='all'?' active':''), onClick:function(){setBrandFilter('all')}}, 'Todos'),
            (appState.brands||[]).map(function(br){ return e('button', {key:br.id, className:'brand-filter-btn' + (brandFilter===br.id?' active':''), onClick:function(){setBrandFilter(br.id)}}, br.label); }),
            e('button', {className:'brand-filter-btn' + (brandFilter==='mix'?' active':''), onClick:function(){setBrandFilter('mix')}}, 'Mix')
          ),
          e('div', null,
            appState.templates.filter(function(t){ return brandFilter==='all' || (t.brand||'mix')===brandFilter; }).map(function(t){
              var tVis = isVisibleForLang(t, boLangFilter);
              return e('div', {key:t.id, className:'list-item', style:{opacity:tVis?1:0.5}},
                e('div', {className:'list-item-info'},
                  e('div', {style:{fontWeight:600,marginBottom:'4px'}}, t.name, t.brand && t.brand !== 'mix' ? e('span', {style:{fontSize:'10px',marginLeft:'6px',padding:'1px 6px',borderRadius:'4px',background:'#e0e7ff',color:'#4338ca'}}, t.brand) : null),
                  e('div', {style:{fontSize:'11px',color:'#6b7280'}}, ((t.compositorBlocks&&t.compositorBlocks.length)||t.blocks.length) + ' bloque(s)')

                e('div', {className:'list-item-actions'},
                  e('button', {className:'btn btn-sm', style:{fontSize:'14px',padding:'4px 8px',borderRadius:'6px',border:'none',cursor:'pointer',marginRight:'6px',backgroundColor:tVis?'#dcfce7':'#f3f4f6',color:tVis?'#16a34a':'#9ca3af'}, onClick:function(){toggleTemplateVisible(t.id)}, title:tVis?'Visible':'Oculto'}, tVis?'👁':'👁‍🗨'),
                  e('button', {className:'btn btn-sm btn-ghost', onClick:function(){setEditingTemplate(t)}}, 'Editar'),
                  e('button', {className:'btn btn-sm btn-danger', onClick:function(){deleteTemplate(t.id)}}, 'Borrar')
                )
              );
            })
          )
        ),

        // SUELTOS (standalone blocks)
        backofficeTab === 'sueltos' && e('div', null,
          e('div', {className:'backoffice-actions'},
            e('button', {className:'btn btn-primary', onClick:function(){setEditingStandaloneBlock({})}}, '+ Añadir bloque suelto')
          ),
          e('div', {className:'brand-filter-bar'},
            e('button', {className:'brand-filter-btn' + (brandFilter==='all'?' active':''), onClick:function(){setBrandFilter('all')}}, 'Todos'),
            (appState.brands||[]).map(function(br){ return e('button', {key:br.id, className:'brand-filter-btn' + (brandFilter===br.id?' active':''), onClick:function(){setBrandFilter(br.id)}}, br.label); }),
            e('button', {className:'brand-filter-btn' + (brandFilter==='mix'?' active':''), onClick:function(){setBrandFilter('mix')}}, 'Mix')
          ),
          e('div', null,
            appState.standaloneBlocks.filter(function(sb){ return brandFilter==='all' || (sb.brand||'mix')===brandFilter; }).map(function(sb){
              var sbVis = isVisibleForLang(sb, boLangFilter);
              return e('div', {key:sb.id, className:'list-item', style:{opacity:sbVis?1:0.5}},
                e('div', {className:'list-item-info'},
                  e('div', {style:{fontWeight:600,marginBottom:'4px'}}, sb.icon + ' ' + sb.title, i18nBadges(sb, sb.blockType === 'pimpam_hero' ? 'hero' : 'text'), sb.brand && sb.brand !== 'mix' ? e('span', {style:{fontSize:'10px',marginLeft:'6px',padding:'1px 6px',borderRadius:'4px',background:'#e0e7ff',color:'#4338ca'}}, sb.brand) : null),
                  e('div', {style:{fontSize:'11px',color:'#6b7280'}}, sb.desc + ' · ' + sb.section)
                ),
                e('div', {className:'list-item-actions'},
                  e('button', {className:'btn btn-sm', style:{fontSize:'14px',padding:'4px 8px',borderRadius:'6px',border:'none',cursor:'pointer',marginRight:'6px',backgroundColor:sbVis?'#dcfce7':'#f3f4f6',color:sbVis?'#16a34a':'#9ca3af'}, onClick:function(){toggleStandaloneBlockVisible(sb.id)}, title:sbVis?'Visible':'Oculto'}, sbVis?'👁':'👁‍🗨'),
                  e('button', {className:'btn btn-sm btn-ghost', onClick:function(){setEditingStandaloneBlock(sb)}}, 'Editar'),
                  e('button', {className:'btn btn-sm btn-danger', onClick:function(){deleteStandaloneBlock(sb.id)}}, 'Borrar')
                )
              );
            })
          )
        ),

            e('p', {style:{fontSize:'12px',color:'#6b7280',marginBottom:'8px'}}, 'Se guarda solo en tu navegador. Necesaria para el asistente IA.'),
            e('input', {className:'form-input', type:'password', value:openaiKey, onChange:function(ev){saveOpenaiKey(ev.target.value)}, placeholder:'sk-...', style:{fontFamily:'monospace'}}),
            openaiKey && e('div', {style:{marginTop:'8px',fontSize:'12px',color:'#16a34a',fontWeight:500}}, '✓ API key configurada')

          e('div', {style:{marginBottom:'24px',padding:'16px',background:'#f9fafb',borderRadius:'10px',border:'1px solid #e5e7eb'}},
            e('label', {className:'form-label', style:{marginBottom:'6px',display:'block',fontWeight:600}}, 'Contraseñas'),
            e('p', {style:{fontSize:'12px',color:'#6b7280',marginBottom:'12px'}}, 'Cambia el password de backoffice o el de datos (importar/exportar/restaurar). Introduce el password actual y el nuevo.'),
            e('div', {style:{display:'flex',gap:'12px',flexWrap:'wrap'}},
              e('button', {className:'btn btn-primary btn-sm', onClick:function(){
                var current = window.prompt('Password actual de backoffice:');
                if (!current) return;
                checkPasswordAsync(current, appState.boPasswordHash, DEFAULT_BO_HASH, function(match) {
                  if (!match) { alert('Password incorrecto.'); return; }
                  var newPass = window.prompt('Nuevo password de backoffice:');
                  if (!newPass || !newPass.trim()) { alert('Cancelado.'); return; }
                  var confirm2 = window.prompt('Repite el nuevo password:');
                  if (newPass !== confirm2) { alert('No coinciden.'); return; }
                  sha256Hash(newPass).then(function(newHash) {
                    var newState = Object.assign({}, appState, {boPasswordHash: newHash});
                    persistState(newState);
                    alert('Password de backoffice cambiado.');
                  });
                });
              }}, 'Cambiar pass backoffice'),
              e('button', {className:'btn btn-primary btn-sm', onClick:function(){
                var current = window.prompt('Password actual de datos:');

                  if (!match) { alert('Password incorrecto.'); return; }
                  var newPass = window.prompt('Nuevo password de datos:');
                  if (!newPass || !newPass.trim()) { alert('Cancelado.'); return; }
                  var confirm2 = window.prompt('Repite el nuevo password:');
                  if (newPass !== confirm2) { alert('No coinciden.'); return; }
                  sha256Hash(newPass).then(function(newHash) {
                    var newState = Object.assign({}, appState, {dataPasswordHash: newHash});
                    persistState(newState);
                    alert('Password de datos cambiado.');
                  });
                });
              }}, 'Cambiar pass datos'),
              appState.boPasswordHash && e('span', {style:{fontSize:'11px',color:'#16a34a',alignSelf:'center'}}, '✓ Pass backoffice personalizado'),

            LANGS.map(function(lk) {
              return e('div', {key:lk, style:{marginBottom:'12px',padding:'12px',background:'#f9fafb',borderRadius:'8px',border:'1px solid #e5e7eb'}},

                e('textarea', {className:'form-textarea', value:(aiStyles && aiStyles[lk]) || '', onChange:function(ev){saveAiStyle(lk, ev.target.value)}, placeholder:'Ej: Tono cercano, tutea, frases cortas...', style:{minHeight:'50px',fontSize:'12px'}})
              );
            })
          )
        )
      )

    editingBrand !== null && e(BrandEditorModal, {
      brand: editingBrand.id ? editingBrand : null,
      isNew: !editingBrand.id,
      onClose: function(){setEditingBrand(null)},
      onSave: saveBrand
    }),

    editingProduct !== null && e(ProductEditorModal, {
      product: editingProduct.id ? editingProduct : null,
      isNew: !editingProduct.id,
      onClose: function(){setEditingProduct(null)},
      onSave: saveProduct,
      brands: appState.brands
    }),

    editingBlock !== null && e(BlockEditorModal, {
      block: editingBlock.id ? editingBlock : null,
      isNew: !editingBlock.id,
      onClose: function(){setEditingBlock(null)},
      onSave: saveComposedBlock,
      brands: appState.brands,
      products: appState.products,
      prewrittenTexts: appState.prewrittenTexts,
      standaloneBlocks: appState.standaloneBlocks
    }),

    editingText !== null && e(TextEditorModal, {
      text: editingText.id ? editingText : null,
      isNew: !editingText.id,

      onSave: saveText,

    editingTemplate !== null && e(TemplateEditorModal, {

      isNew: !editingTemplate.id,

      texts: appState.prewrittenTexts,
      onClose: function(){setEditingTemplate(null)},
      onSave: saveTemplate,
      brands: appState.brands
    }),

    editingStandaloneBlock !== null && e(StandaloneBlockEditorModal, {
      standaloneBlock: editingStandaloneBlock.id ? editingStandaloneBlock : null,
      isNew: !editingStandaloneBlock.id,
      onClose: function(){setEditingStandaloneBlock(null)},
      onSave: saveStandaloneBlock,
      brands: appState.brands
    })
  );
}

ReactDOM.render(e(EmailComposer), document.getElementById('root'));
