<html lang="es">
<head>

<title>Bomedia Email Composer v3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:#f3f4f6;color:#1e293b;overflow:hidden;height:100vh}

/* Layout */
.app{display:flex;flex-direction:column;height:100vh}
.header{background:#fff;border-bottom:1px solid #e5e7eb;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:14px}
.header-title{font-size:13px;font-weight:800;color:#111}
.header-sub{font-size:11px;color:#9ca3af}
.header-right{display:flex;gap:8px;align-items:center}

.header-mode-toggle{display:flex;gap:4px;align-items:center;margin-right:12px;padding-right:12px;border-right:1px solid #e5e7eb}
.mode-btn{border:none;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;background:#f3f4f6;color:#6b7280}
.mode-btn.active{background:#2563eb;color:#fff}
.mode-btn:hover:not(.active){background:#e5e7eb}

.main{display:flex;flex:1;overflow:hidden}
.footer{background:#fff;border-top:1px solid #e5e7eb;padding:5px 16px;display:flex;justify-content:space-between;font-size:11px;color:#9ca3af;flex-shrink:0}

/* Sidebar */
.sidebar{width:280px;background:#fff;border-right:1px solid #e5e7eb;padding:12px;overflow-y:auto;flex-shrink:0}
.sidebar-section{margin-bottom:20px}
.sidebar-section-header{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 0;user-select:none;transition:all .15s}
.sidebar-section-header:hover{color:#334151}
.sidebar-section-title{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:1.2px;flex:1}
.sidebar-section-toggle{width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:#9ca3af}
.sidebar-section-toggle.open{transform:rotate(180deg)}
.sidebar-section-content{margin-top:8px;border-top:1px solid #f3f4f6;padding-top:8px}

/* Text block buttons */
.add-btn{width:100%;display:flex;align-items:center;gap:8px;padding:7px 8px;border:none;background:transparent;border-radius:8px;cursor:pointer;text-align:left;transition:background .15s}
.add-btn:hover{background:#f3f4f6}
.add-btn-icon{width:44px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.add-btn-label{font-size:11px;font-weight:600;color:#374151}
.add-btn-desc{font-size:9px;color:#9ca3af;line-height:1.3;margin-top:1px}

/* Product block buttons */
.product-block-btn{width:100%;display:flex;align-items:stretch;border:none;background:#fff;border-radius:8px;cursor:pointer;margin-bottom:8px;transition:all .15s;border:1px solid #e5e7eb;overflow:hidden}
.product-block-btn:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08);border-color:#d1d5db}
.product-block-btn-border{width:4px;background:#999;flex-shrink:0}
.product-block-btn-border.blue{background:#3b82f6}
.product-block-btn-border.purple{background:#8b5cf6}
.product-block-btn-border.orange{background:#f97316}
.product-block-btn-border.gray{background:#64748b}
.product-block-btn-content{display:flex;flex-direction:column;justify-content:center;padding:8px 12px;flex:1;text-align:left}
.product-block-btn-title{font-size:11px;font-weight:700;color:#1f2937}
.product-block-btn-desc{font-size:9px;color:#6b7280;margin-top:2px}
.product-block-btn-price{font-size:8px;color:#9ca3af;margin-top:2px}

/* Template section */
.template-section{margin-top:20px;padding-top:12px;border-top:1px solid #f3f4f6}
.tpl-btn{width:100%;padding:8px;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;margin-bottom:4px;transition:all .15s}
.tpl-blue{background:#eff6ff;color:#1d4ed8}.tpl-blue:hover{background:#dbeafe}
.tpl-orange{background:#fff7ed;color:#c2410c}.tpl-orange:hover{background:#ffedd5}
.tpl-purple{background:#f5f3ff;color:#6d28d9}.tpl-purple:hover{background:#ede9fe}
.tpl-gray{background:#f3f4f6;color:#475569}.tpl-gray:hover{background:#e5e7eb}

/* Editor panel */
.editor{flex:1;padding:16px;overflow-y:auto}
.editor-inner{max-width:500px;margin:0 auto}
.empty-state{text-align:center;padding:60px 20px;color:#9ca3af}
.empty-icon{font-size:40px;opacity:.4;margin-bottom:12px}

/* Block card */
.block-card{background:#fff;border-radius:8px;border:1px solid #e5e7eb;border-left:4px solid #9ca3af;margin-bottom:8px;overflow:hidden}
.block-card.blue{border-left-color:#3b82f6}
.block-card.purple{border-left-color:#8b5cf6}
.block-card.orange{border-left-color:#f97316}
.block-card.green{border-left-color:#22c55e}
.block-card.dark{border-left-color:#475569}

.block-header{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#f9fafb;border-bottom:1px solid #f3f4f6}
.block-header-left{display:flex;align-items:center;gap:6px}
.block-type-icon{font-size:12px}
.block-type-label{font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.8px}
.block-actions{display:flex;align-items:center;gap:2px}
.block-actions button{border:none;background:transparent;cursor:pointer;padding:3px;color:#9ca3af;border-radius:4px;display:flex;align-items:center;transition:color .15s}
.block-actions button:hover{color:#374151}
.block-actions button:disabled{opacity:.25;cursor:default}
.block-actions .del-btn:hover{color:#ef4444}

.block-body{padding:8px 10px}
.block-body textarea{width:100%;border:1px solid #e5e7eb;border-radius:6px;padding:8px;font-size:12px;font-family:inherit;resize:vertical;min-height:70px;outline:none;line-height:1.5}
.block-body textarea:focus{border-color:#93c5fd;box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.block-body select{font-size:11px;border:1px solid #d1d5db;border-radius:6px;padding:4px 8px;background:#fff;outline:none}
.block-body select:focus{border-color:#93c5fd}
.block-body .prod-selectors{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.block-body .prod-selectors label{font-size:10px;color:#9ca3af;display:flex;align-items:center;gap:4px}
.block-body .fixed-msg{font-size:11px;color:#9ca3af;font-style:italic}

/* Preview */
.preview-panel{width:50%;border-left:1px solid #e5e7eb;background:#fff;overflow-y:auto;display:flex;flex-direction:column}
.preview-header{position:sticky;top:0;background:#fff;border-bottom:1px solid #f3f4f6;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;z-index:10}
.preview-label{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:1px}
.preview-content{padding:16px;flex:1}
.preview-frame{border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}
.html-code{padding:16px;font-family:'Menlo','Monaco','Courier New',monospace;font-size:10px;line-height:1.6;color:#475569;white-space:pre-wrap;word-break:break-all;overflow-x:auto}

/* Buttons */
.btn{border:none;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-success{background:#22c55e;color:#fff}
.btn-ghost{background:#f3f4f6;color:#6b7280}.btn-ghost:hover{background:#e5e7eb}
.btn-toggle{background:#eff6ff;color:#2563eb}
.btn-toggle.off{background:#f3f4f6;color:#9ca3af}
.btn-sm{padding:4px 10px;font-size:10px}
.btn-danger{background:#fecaca;color:#991b1b}.btn-danger:hover{background:#fca5a5}

/* BACKOFFICE STYLES */
.backoffice-container{display:flex;flex-direction:column;flex:1;width:100%;overflow:hidden}
.backoffice-tabs{display:flex;gap:0;border-bottom:1px solid #e5e7eb;background:#fff;padding:0 16px;flex-shrink:0}
.backoffice-tab{padding:12px 16px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:#6b7280;transition:all .2s;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.5px}
.backoffice-tab:hover{color:#374151}
.backoffice-tab.active{color:#2563eb;border-bottom-color:#2563eb}

.backoffice-content{flex:1;overflow-y:auto;padding:16px}
.backoffice-actions{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}

.data-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}
.data-table thead{background:#f9fafb;border-bottom:1px solid #e5e7eb}
.data-table th{padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px}
.data-table td{padding:12px 16px;border-bottom:1px solid #f3f4f6;font-size:12px}
.data-table tr:last-child td{border-bottom:none}
.data-table tbody tr:hover{background:#f9fafb}

.product-thumb{width:40px;height:40px;border-radius:4px;object-fit:contain;background:#f3f4f6;padding:2px}

.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:6px}
.form-input,.form-textarea,.form-select,.form-color{width:100%;padding:10px 14px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s;background:#fff}
.form-input:focus,.form-textarea:focus,.form-select:focus,.form-color:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.form-textarea{resize:vertical;min-height:80px}
.form-input:disabled{background:#f3f4f6;color:#9ca3af}
.form-color{cursor:pointer}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-panel{background:#fff;border-radius:16px;padding:0;width:90vw;max-width:800px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 50px -12px rgba(0,0,0,0.25)}
.modal-header{font-size:18px;font-weight:800;color:#0f172a;padding:20px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e5e7eb;position:sticky;top:0;background:#fff;z-index:5;border-radius:16px 16px 0 0}
.modal-body{padding:24px 28px}
.modal-close{background:#f3f4f6;border:none;color:#6b7280;cursor:pointer;font-size:16px;padding:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:all .15s}
.modal-close:hover{color:#111827;background:#e5e7eb}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;padding:16px 28px;border-top:1px solid #e5e7eb;position:sticky;bottom:0;background:#fff;border-radius:0 0 16px 16px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 20px}
.modal-grid .form-group-full{grid-column:1/-1}

.image-preview{max-width:150px;max-height:120px;border:1px solid #e5e7eb;border-radius:6px;margin-top:8px}

.list-item{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.list-item-info{flex:1}
.list-item-actions{display:flex;gap:4px}

.tab-content{display:none}
.tab-content.active{display:block}

.color-tag{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:6px}
.color-tag.blue{background:#3b82f6}
.color-tag.purple{background:#8b5cf6}
.color-tag.orange{background:#f97316}
.color-tag.gray{background:#64748b}

.block-list-item{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:start}
.block-list-content{flex:1}
.block-list-title{font-weight:600;margin-bottom:4px;font-size:12px}
.block-list-desc{font-size:11px;color:#6b7280;margin-bottom:6px}

/* Responsive */
@media(max-width:900px){
  .sidebar{width:280px}
  .preview-panel{display:none}
  .form-row{grid-template-columns:1fr}
}
</style>

var SUPABASE_TABLE = 'composer_data';
var SUPABASE_ROW_ID = 'main';

function supabaseFetch(method, body) {
  var url = SUPABASE_URL + '/rest/v1/' + SUPABASE_TABLE + '?id=eq.' + SUPABASE_ROW_ID;
  var opts = {
    method: method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'GET' ? '' : 'return=minimal'
    }
  };
  if (method === 'GET') {
    url = SUPABASE_URL + '/rest/v1/' + SUPABASE_TABLE + '?select=data&id=eq.' + SUPABASE_ROW_ID;
    delete opts.headers['Prefer'];
  }
  if (body) opts.body = JSON.stringify(body);
  return fetch(url, opts);
}

function loadFromSupabase() {
  return supabaseFetch('GET')
    .then(function(r) { return r.json(); })
    .then(function(rows) {
      if (rows && rows.length > 0 && rows[0].data && Object.keys(rows[0].data).length > 0) {
        return rows[0].data;
      }
      return null;
    })
    .catch(function(e) {
      console.warn('Supabase load failed:', e);
      return null;
    });
}

function saveToSupabase(data) {
  supabaseFetch('PATCH', { data: data, updated_at: new Date().toISOString() })
    .then(function(r) {
      if (!r.ok) console.warn('Supabase save failed:', r.status);
    })
    .catch(function(e) {
      console.warn('Supabase save error:', e);
    });
}

function getStorageData() {
  try {
    var stored = localStorage.getItem('bomedia_composer_data');
    return stored ? JSON.parse(stored) : null;
  } catch(e) {
    return null;
  }
}

function saveStorageData(data) {
  try {
    localStorage.setItem('bomedia_composer_data', JSON.stringify(data));
  } catch(e) {
    console.error('Error saving to localStorage:', e);
  }
}

function generateFullHtml(blocks, products) {
  var rows = '';
  for (var i = 0; i < blocks.length; i++) {
    var b = blocks[i];
    switch(b.type) {
      case 'text': rows += textBlockHtml(b.text); break;
      case 'brand_artisjet': rows += brandStripHtml('artisjet'); break;
      case 'brand_mbo': rows += brandStripHtml('mbo'); break;
      case 'brand_pimpam': rows += brandStripHtml('pimpam'); break;
      case 'product_single':
        var ps = products.find(function(p){return p.id===b.product1});
        if(ps) rows += productSingleHtml(ps);
        break;
      case 'product_pair':
        var p1 = products.find(function(p){return p.id===b.product1});
        var p2 = products.find(function(p){return p.id===b.product2});
        if(p1&&p2) rows += productPairHtml(p1,p2);
        break;
      case 'product_trio':
        var pt1 = products.find(function(p){return p.id===b.product1});
        var pt2 = products.find(function(p){return p.id===b.product2});
        var pt3 = products.find(function(p){return p.id===b.product3});
        if(pt1&&pt2&&pt3) rows += productTrioHtml(pt1,pt2,pt3);
        break;
      case 'freebird': rows += freebirdHtml(b); break;
      case 'pimpam_hero': rows += pimpamHeroHtml(b); break;
      case 'pimpam_steps': rows += pimpamStepsHtml(b); break;
    }
  }
  return '<html><head>'+CSS_BLOCK+'</head><body style="font-family:\'Helvetica Neue\',Helvetica,Arial,sans-serif;margin:0;padding:0;background:#ffffff;color:#1e293b">' +
    '<table class="wrap" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin:0 auto">' + rows + '</table></body></html>';
}

function TemplateEditorModal(props) {

  var updateForm = function(key, value) {
    var newForm = Object.assign({}, form, {});
    newForm[key] = value;
    setForm(newForm);
  };

  var allItems = (props.blocks || []).concat(props.texts || []).sort(function(a,b){return (a.id||'').localeCompare(b.id||'')});

  var toggleBlock = function(id) {
    var blocks = form.blocks.slice();
    var idx = blocks.indexOf(id);
    if(idx >= 0) {
      blocks.splice(idx, 1);
    } else {
      blocks.push(id);
    }
    updateForm('blocks', blocks);
  };

  var moveBlockUp = function(idx) {
    if(idx <= 0) return;
    var blocks = form.blocks.slice();
    var tmp = blocks[idx]; blocks[idx] = blocks[idx-1]; blocks[idx-1] = tmp;
    updateForm('blocks', blocks);
  };

  var moveBlockDown = function(idx) {
    if(idx >= form.blocks.length - 1) return;
    var blocks = form.blocks.slice();
    var tmp = blocks[idx]; blocks[idx] = blocks[idx+1]; blocks[idx+1] = tmp;
    updateForm('blocks', blocks);
  };

  var removeBlock = function(idx) {
    var blocks = form.blocks.slice();
    blocks.splice(idx, 1);
    updateForm('blocks', blocks);
  };

  return e('div', {className:'modal-overlay', onClick:props.onClose},
    e('div', {className:'modal-panel', onClick:function(ev){ev.stopPropagation()}},

        setAppState(cloudData);
        saveStorageData(cloudData);
        setSyncStatus('cloud');
        setTimeout(function(){ setSyncStatus(''); }, 3000);
      } else {
        // No cloud data yet — push local/default data to Supabase

        saveToSupabase(local);
        setSyncStatus('');
      }
    });
  }, []);

  var _blocks = useState(function(){
    try {
      var saved = localStorage.getItem('bomedia_draft_blocks');

          blockIdCounter = Math.max.apply(null, parsed.map(function(b){return typeof b.id === 'number' ? b.id : 0})) + 1;

    var newBlocks = [];
    // Add intro text block
    if (composedBlock.introText) {
      newBlocks.push({id: ++blockIdCounter, type:'text', text: composedBlock.introText});
    }
    // Add brand strip if specified
    if (composedBlock.brandStrip && composedBlock.brandStrip !== 'none') {
      newBlocks.push({id: ++blockIdCounter, type:'brand_' + composedBlock.brandStrip, brand: composedBlock.brandStrip});
    }
    // Add hero if PimPam
    if (composedBlock.includeHero) {
      newBlocks.push({id: ++blockIdCounter, type:'pimpam_hero'});
    }
    // Add products
    var prods = composedBlock.products || [];
    if (composedBlock.blockType === 'product_trio' && prods.length >= 3) {
      newBlocks.push({id: ++blockIdCounter, type:'product_trio', product1:prods[0], product2:prods[1], product3:prods[2]});
    } else if (composedBlock.blockType === 'product_pair' && prods.length >= 2) {
      newBlocks.push({id: ++blockIdCounter, type:'product_pair', product1:prods[0], product2:prods[1]});
    } else if (composedBlock.blockType === 'product_single' && prods.length >= 1) {
      newBlocks.push({id: ++blockIdCounter, type:'product_single', product1:prods[0]});
    }
    // Add steps if specified
    if (composedBlock.includeSteps) {
      newBlocks.push({id: ++blockIdCounter, type:'pimpam_steps'});
    }
    setBlocks(function(prev){ return prev.concat(newBlocks); });
  }

          )
        ),

        // BLOQUES
        backofficeTab === 'blocks' && e('div', null,
          e('div', {className:'backoffice-actions'},
            e('button', {className:'btn btn-primary', onClick:function(){setEditingBlock({})}}, '+ Añadir bloque')
          ),
          e('div', null,
            appState.composedBlocks.map(function(b){
              return e('div', {key:b.id, className:'block-list-item', style:{opacity:b.visible !== false?1:0.5}},
                e('div', {className:'block-list-content'},
                  e('div', {className:'block-list-title'},
                    e('span', {className:'color-tag ' + b.colorTag}),
                    b.title
                  ),
                  e('div', {className:'block-list-desc'}, b.desc)
                ),
                e('div', {className:'list-item-actions'},
                  e('button', {className:'btn btn-sm', style:{fontSize:'14px',padding:'4px 8px',borderRadius:'6px',border:'none',cursor:'pointer',marginRight:'6px',backgroundColor:b.visible !== false?'#dcfce7':'#f3f4f6',color:b.visible !== false?'#16a34a':'#9ca3af'}, onClick:function(){toggleComposedBlockVisible(b.id)}, title:b.visible !== false?'Visible':'Oculto'}, b.visible !== false?'👁':'👁‍🗨'),
                  e('button', {className:'btn btn-sm btn-ghost', onClick:function(){setEditingBlock(b)}}, 'Editar'),
                  e('button', {className:'btn btn-sm btn-danger', onClick:function(){deleteComposedBlock(b.id)}}, 'Borrar')
                )
              );
            })
          )
        ),

        // TEXTOS
        backofficeTab === 'texts' && e('div', null,
          e('div', {className:'backoffice-actions'},
            e('button', {className:'btn btn-primary', onClick:function(){setEditingText({})}}, '+ Añadir texto')
          ),
          e('div', null,
            appState.prewrittenTexts.map(function(t){
              return e('div', {key:t.id, className:'list-item', style:{opacity:t.visible !== false?1:0.5}},
                e('div', {className:'list-item-info'},
                  e('div', {style:{fontWeight:600,marginBottom:'4px'}}, t.icon + ' ' + t.name),
                  e('div', {style:{fontSize:'11px',color:'#6b7280'}}, t.text.substring(0,60) + '...')
                ),
                e('div', {className:'list-item-actions'},
                  e('button', {className:'btn btn-sm', style:{fontSize:'14px',padding:'4px 8px',borderRadius:'6px',border:'none',cursor:'pointer',marginRight:'6px',backgroundColor:t.visible !== false?'#dcfce7':'#f3f4f6',color:t.visible !== false?'#16a34a':'#9ca3af'}, onClick:function(){toggleTextVisible(t.id)}, title:t.visible !== false?'Visible':'Oculto'}, t.visible !== false?'👁':'👁‍🗨'),
                  e('button', {className:'btn btn-sm btn-ghost', onClick:function(){setEditingText(t)}}, 'Editar'),
                  e('button', {className:'btn btn-sm btn-danger', onClick:function(){deleteText(t.id)}}, 'Borrar')
                )
              );
            })
          )
        ),

        // PLANTILLAS
        backofficeTab === 'templates' && e('div', null,
          e('div', {className:'backoffice-actions'},
            e('button', {className:'btn btn-primary', onClick:function(){setEditingTemplate({})}}, '+ Añadir plantilla')
          ),
          e('div', null,
            appState.templates.map(function(t){
              return e('div', {key:t.id, className:'list-item', style:{opacity:t.visible !== false?1:0.5}},
                e('div', {className:'list-item-info'},
                  e('div', {style:{fontWeight:600,marginBottom:'4px'}}, t.name),
                  e('div', {style:{fontSize:'11px',color:'#6b7280'}}, t.blocks.length + ' bloque(s)')
                ),
                e('div', {className:'list-item-actions'},
                  e('button', {className:'btn btn-sm', style:{fontSize:'14px',padding:'4px 8px',borderRadius:'6px',border:'none',cursor:'pointer',marginRight:'6px',backgroundColor:t.visible !== false?'#dcfce7':'#f3f4f6',color:t.visible !== false?'#16a34a':'#9ca3af'}, onClick:function(){toggleTemplateVisible(t.id)}, title:t.visible !== false?'Visible':'Oculto'}, t.visible !== false?'👁':'👁‍🗨'),
                  e('button', {className:'btn btn-sm btn-ghost', onClick:function(){setEditingTemplate(t)}}, 'Editar'),
                  e('button', {className:'btn btn-sm btn-danger', onClick:function(){deleteTemplate(t.id)}}, 'Borrar')
                )
              );
            })
          )
        ),

        // SUELTOS (standalone blocks)
        backofficeTab === 'sueltos' && e('div', null,
          e('div', {className:'backoffice-actions'},
            e('button', {className:'btn btn-primary', onClick:function(){setEditingStandaloneBlock({})}}, '+ Añadir bloque suelto')
          ),
          e('div', null,
            appState.standaloneBlocks.map(function(sb){
              return e('div', {key:sb.id, className:'list-item', style:{opacity:sb.visible !== false?1:0.5}},
                e('div', {className:'list-item-info'},
                  e('div', {style:{fontWeight:600,marginBottom:'4px'}}, sb.icon + ' ' + sb.title),
                  e('div', {style:{fontSize:'11px',color:'#6b7280'}}, sb.desc + ' · ' + sb.section)
                ),
                e('div', {className:'list-item-actions'},
                  e('button', {className:'btn btn-sm', style:{fontSize:'14px',padding:'4px 8px',borderRadius:'6px',border:'none',cursor:'pointer',marginRight:'6px',backgroundColor:sb.visible !== false?'#dcfce7':'#f3f4f6',color:sb.visible !== false?'#16a34a':'#9ca3af'}, onClick:function(){toggleStandaloneBlockVisible(sb.id)}, title:sb.visible !== false?'Visible':'Oculto'}, sb.visible !== false?'👁':'👁‍🗨'),
                  e('button', {className:'btn btn-sm btn-ghost', onClick:function(){setEditingStandaloneBlock(sb)}}, 'Editar'),
                  e('button', {className:'btn btn-sm btn-danger', onClick:function(){deleteStandaloneBlock(sb.id)}}, 'Borrar')
                )
              );
            })
          )
        )
      )
    ),

    editingProduct !== null && e(ProductEditorModal, {
      product: editingProduct.id ? editingProduct : null,
      isNew: !editingProduct.id,
      onClose: function(){setEditingProduct(null)},
      onSave: saveProduct
    }),

    editingBlock !== null && e(BlockEditorModal, {
      block: editingBlock.id ? editingBlock : null,
      isNew: !editingBlock.id,
      onClose: function(){setEditingBlock(null)},
      onSave: saveComposedBlock
    }),

    editingText !== null && e(TextEditorModal, {
      text: editingText.id ? editingText : null,
      isNew: !editingText.id,
      onClose: function(){setEditingText(null)},
      onSave: saveText
    }),

    editingTemplate !== null && e(TemplateEditorModal, {
      template: editingTemplate.id ? editingTemplate : null,
      isNew: !editingTemplate.id,
      blocks: appState.composedBlocks,
      texts: appState.prewrittenTexts,
      onClose: function(){setEditingTemplate(null)},
      onSave: saveTemplate
    }),

    editingStandaloneBlock !== null && e(StandaloneBlockEditorModal, {
      standaloneBlock: editingStandaloneBlock.id ? editingStandaloneBlock : null,
      isNew: !editingStandaloneBlock.id,
      onClose: function(){setEditingStandaloneBlock(null)},
      onSave: saveStandaloneBlock
    })
  );
}

ReactDOM.render(e(EmailComposer), document.getElementById('root'));
</script>
</body>
</html>
